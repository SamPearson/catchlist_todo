
{% extends "bulma_base.html" %}

{% block title %}{{ report_type }} Report - {{ date }}{% endblock %}

{% block content %}
    <!-- Hero Section -->
    <section class="hero is-primary is-small">
        <div class="hero-body">
            <div class="container">
                <div class="level is-mobile">
                    <!-- Left side -->
                    <div class="level-left">
                        <div class="level-item">
                            <a href="{{ url_for(prev_url, date=(parse_date(date) - nav_delta).strftime('%Y-%m-%d')) }}"
                               class="button is-primary is-inverted"
                               data-testid="prev-{{ nav_text.lower() }}-button">
                                <span class="icon">
                                    <i class="fas fa-chevron-left"></i>
                                </span>
                                <span>Previous {{ nav_text }}</span>
                            </a>
                        </div>
                    </div>

                    <!-- Center -->
                    <div class="level-item has-text-centered">
                        <div>
                            <p class="title" data-testid="report-title">{{ report_type }} Report</p>
                            <p class="subtitle" data-testid="report-subtitle">{% block report_date %}{{ date }}{% endblock %}</p>
                        </div>
                    </div>

                    <!-- Right side -->
                    <div class="level-right">
                        <div class="level-item">
                            <a href="{{ url_for(next_url, date=(parse_date(date) + nav_delta).strftime('%Y-%m-%d')) }}"
                               class="button is-primary is-inverted"
                               data-testid="next-{{ nav_text.lower() }}-button">
                                <span>Next {{ nav_text }}</span>
                                <span class="icon">
                                    <i class="fas fa-chevron-right"></i>
                                </span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="box">
                <form method="POST">
                    {% block report_content %}{% endblock %}

                    <!-- Save Button -->
                    <div class="field mt-5">
                        <div class="control">
                            <button type="submit" class="button is-primary is-fullwidth" data-testid="save-report-button">
                                <span class="icon">
                                    <i class="fas fa-save"></i>
                                </span>
                                <span>Save Report</span>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>
{% endblock %}
