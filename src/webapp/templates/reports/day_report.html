
{% extends "bulma_base.html" %}

{% block title %}Daily Report - {{ date }}{% endblock %}

{% block content %}
    <!-- Hero Section -->
    <section class="hero is-primary is-small">
        <div class="hero-body">
            <div class="container">
                <div class="level is-mobile">
                    <!-- Left side -->
                    <div class="level-left">
                        <div class="level-item">
                            <a href="{{ url_for('reports.daily', date=(parse_date(date) - timedelta(days=1)).strftime('%Y-%m-%d')) }}"
                               class="button is-primary is-inverted">
                                <span class="icon">
                                    <i class="fas fa-chevron-left"></i>
                                </span>
                                <span>Previous Day</span>
                            </a>
                        </div>
                    </div>

                    <!-- Center -->
                    <div class="level-item has-text-centered">
                        <div>
                            <p class="title">Daily Report</p>
                            <p class="subtitle">{{ date }}</p>
                        </div>
                    </div>

                    <!-- Right side -->
                    <div class="level-right">
                        <div class="level-item">
                            <a href="{{ url_for('reports.daily', date=(parse_date(date) + timedelta(days=1)).strftime('%Y-%m-%d')) }}"
                               class="button is-primary is-inverted">
                                <span>Next Day</span>
                                <span class="icon">
                                    <i class="fas fa-chevron-right"></i>
                                </span>
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="section">
        <div class="container">
            <div class="box">
                <form method="POST">
                    <!-- Wellness Metrics -->
                    <h3 class="title is-4">Wellness</h3>
                    <div class="columns">
                        <div class="column">
                            <div class="field">
                                <label class="label">Sleep Hours</label>
                                <div class="control">
                                    <input class="input" type="number" step="0.5" name="sleep_hours"
                                           value="{{ report.sleep_hours if report else '' }}">
                                </div>
                            </div>
                        </div>
                        <div class="column">
                            <div class="field">
                                <label class="label">Prayer Rating (1-10)</label>
                                <div class="control">
                                    <input class="input" type="number" min="1" max="10" name="prayer_rating"
                                           value="{{ report.prayer_rating if report else '' }}">
                                </div>
                            </div>
                        </div>
                        <div class="column">
                            <div class="field">
                                <label class="label">Diet</label>
                                <div class="control">
                                    <div class="select is-fullwidth">
                                        <select name="diet_adherence">
                                            <option value="">Select...</option>
                                            <option value="1" {{ 'selected' if report and report.diet_adherence == 1 else '' }}>Maintained</option>
                                            <option value="0" {{ 'selected' if report and report.diet_adherence == 0 else '' }}>Off Plan</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Work and Productivity -->
                    <h3 class="title is-4 mt-5">Work & Activity</h3>
                    <div class="columns">
                        <div class="column">
                            <div class="field">
                                <label class="label">Work Adherence</label>
                                <div class="control">
                                    <div class="select is-fullwidth">
                                        <select name="work_adherence">
                                            <option value="">Select...</option>
                                            <option value="1" {{ 'selected' if report and report.work_adherence == 1 else '' }}>Completed</option>
                                            <option value="0" {{ 'selected' if report and report.work_adherence == 0 else '' }}>Incomplete</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="column">
                            <div class="field">
                                <label class="label">Work RPE (1-10)</label>
                                <div class="control">
                                    <input class="input" type="number" min="1" max="10" name="work_rpe"
                                           value="{{ report.work_rpe if report else '' }}">
                                </div>
                            </div>
                        </div>
                        <div class="column">
                            <div class="field">
                                <label class="label">Cleaning</label>
                                <div class="control">
                                    <div class="select is-fullwidth">
                                        <select name="cleaning_adherence">
                                            <option value="">Select...</option>
                                            <option value="1" {{ 'selected' if report and report.cleaning_adherence == 1 else '' }}>Completed</option>
                                            <option value="0" {{ 'selected' if report and report.cleaning_adherence == 0 else '' }}>Not Done</option>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Daily Ratings -->
                    <h3 class="title is-4 mt-5">Ratings</h3>
                    <div class="columns">
                        <div class="column">
                            <div class="field">
                                <label class="label">Gains Rating (1-10)</label>
                                <div class="control">
                                    <input class="input" type="number" min="1" max="10" name="gains_rating"
                                           value="{{ report.gains_rating if report else '' }}">
                                </div>
                            </div>
                        </div>
                        <div class="column">
                            <div class="field">
                                <label class="label">Drugs Rating (1-10)</label>
                                <div class="control">
                                    <input class="input" type="number" min="1" max="10" name="drugs_rating"
                                           value="{{ report.drugs_rating if report else '' }}">
                                </div>
                            </div>
                        </div>
                        <div class="column">
                            <div class="field">
                                <label class="label">Distractions Rating (1-10)</label>
                                <div class="control">
                                    <input class="input" type="number" min="1" max="10" name="distractions_rating"
                                           value="{{ report.distractions_rating if report else '' }}">
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Notes -->
                    <h3 class="title is-4 mt-5">Notes</h3>
                    <div class="field">
                        <label class="label">Gains</label>
                        <div class="control">
                            <textarea class="textarea" name="gains" rows="4">{{ report.gains if report else '' }}</textarea>
                        </div>
                    </div>

                    <!-- Save Button -->
                    <div class="field mt-5">
                        <div class="control">
                            <button type="submit" class="button is-primary is-fullwidth">
                                <span class="icon">
                                    <i class="fas fa-save"></i>
                                </span>
                                <span>Save Report</span>
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>
{% endblock %}
