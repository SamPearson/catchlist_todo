{% extends "base.html" %}

{% block content %}
<div class="ui container">
    <h1 class="ui header">Today's Schedule</h1>
    
    <div class="ui statistics">
        <div class="statistic">
            <div class="value" id="points">0</div>
            <div class="label">Points</div>
        </div>
        <div class="statistic">
            <div class="value" id="streak">0</div>
            <div class="label">Day Streak</div>
        </div>
        <div class="statistic">
            <div class="value" id="completion-rate">0%</div>
            <div class="label">Completion Rate</div>
        </div>
    </div>
    
    <div class="ui segment">
        <h3 class="ui header">Current Activity</h3>
        <div id="current-activity-container">
            <!-- Current activity will be loaded here -->
            <div class="ui placeholder">
                <div class="header">
                    <div class="line"></div>
                </div>
                <div class="paragraph">
                    <div class="line"></div>
                    <div class="line"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="ui segment">
        <h3 class="ui header">Today's Schedule</h3>
        <div class="ui divided items" id="today-items">
            <!-- Schedule will be loaded here -->
            <div class="ui placeholder">
                <div class="header">
                    <div class="line"></div>
                </div>
                <div class="paragraph">
                    <div class="line"></div>
                    <div class="line"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="ui segment">
        <h3 class="ui header">Today's Tasks</h3>
        <div class="ui divided items" id="today-tasks">
            <!-- Tasks will be loaded here -->
            <div class="ui placeholder">
                <div class="header">
                    <div class="line"></div>
                </div>
                <div class="paragraph">
                    <div class="line"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="ui segment">
        <h3 class="ui header">Catchlist Items</h3>
        <div class="ui divided items" id="today-catchlist">
            <!-- Catchlist items will be loaded here -->
            <div class="ui placeholder">
                <div class="header">
                    <div class="line"></div>
                </div>
                <div class="paragraph">
                    <div class="line"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Reports Section -->
    <div class="ui segment">
        <h3 class="ui header">Weekly Report</h3>
        <div class="ui basic button" id="view-weekly-report">
            <i class="chart bar icon"></i> View Weekly Report
        </div>
    </div>
</div>

<!-- Weekly Report Modal -->
<div class="ui modal" id="weekly-report-modal">
    <i class="close icon"></i>
    <div class="header">
        Weekly Report
        <div class="ui tiny buttons right floated">
            <button class="ui left labeled icon button" id="prev-week-btn">
                <i class="left arrow icon"></i>
                Previous Week
            </button>
            <button class="ui right labeled icon button" id="next-week-btn">
                Next Week
                <i class="right arrow icon"></i>
            </button>
        </div>
    </div>
    <div class="content" id="weekly-report-content">
        <div class="ui placeholder">
            <div class="header">
                <div class="line"></div>
            </div>
            <div class="paragraph">
                <div class="line"></div>
                <div class="line"></div>
                <div class="line"></div>
            </div>
        </div>
    </div>
</div>

<!-- Comments Modal -->
<div class="ui modal" id="comments-modal">
    <i class="close icon"></i>
    <div class="header" id="comments-modal-title">Comments</div>
    <div class="content" id="comments-modal-content">
        <!-- Comments will be loaded here -->
    </div>
</div>

<script src="{{ url_for('static', filename='js/comments.js') }}"></script>
<script>
// Set the API URL for comments.js
setApiUrl('{{ API_URL }}');

// Function to get auth token from cookies
function getAuthToken() {
    const cookies = document.cookie.split(';');
    for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.startsWith('auth_token=')) {
            return cookie.substring('auth_token='.length, cookie.length);
        }
    }
    return '';
}

// Current report end date
let currentReportEndDate = null;

// Load today's events when page loads
document.addEventListener('DOMContentLoaded', function() {
    loadTodayEvents();
    loadTodayTasks();
    loadTodayCatchlist();
    
    // Set up weekly report button
    document.getElementById('view-weekly-report').addEventListener('click', function() {
        loadWeeklyReport();
    });
    
    // Set up weekly report navigation buttons
    document.getElementById('prev-week-btn').addEventListener('click', function() {
        navigateWeek(-1);
    });
    
    document.getElementById('next-week-btn').addEventListener('click', function() {
        navigateWeek(1);
    });
});

// Navigate to previous or next week
function navigateWeek(direction) {
    if (!currentReportEndDate) {
        // If no current date, use today
        currentReportEndDate = new Date();
    } else {
        // Convert string date to Date object if needed
        currentReportEndDate = typeof currentReportEndDate === 'string' 
            ? new Date(currentReportEndDate) 
            : currentReportEndDate;
    }
    
    // Move forward or backward by 7 days
    const newDate = new Date(currentReportEndDate);
    newDate.setDate(newDate.getDate() + (direction * 7));
    
    // Ensure the end date is always a Saturday (day before Sunday)
    const dayOfWeek = newDate.getDay();
    if (dayOfWeek !== 6) { // 6 is Saturday
        // Adjust to the nearest Saturday
        const daysToSaturday = dayOfWeek === 0 ? -1 : 6 - dayOfWeek;
        newDate.setDate(newDate.getDate() + daysToSaturday);
    }
    
    // Format date for API
    const formattedDate = formatDateForAPI(newDate);
    
    // Load the report for the new week
    loadWeeklyReport(formattedDate);
}

// Format date as YYYY-MM-DD for API
function formatDateForAPI(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
}

// Load today's events from API
function loadTodayEvents() {
    fetch('{{ API_URL }}/today/events', {
        method: 'GET',
        headers: {
            'Authorization': 'Bearer ' + getAuthToken()
        }
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        return response.json();
    })
    .then(events => {
        displayEvents(events);
        calculateStats(events);
    })
    .catch(error => {
        console.error('Error loading events:', error);
        document.getElementById('today-items').innerHTML = `
            <div class="ui negative message">
                <div class="header">Error Loading Events</div>
                <p>Could not load today's events. Please try again later.</p>
            </div>
        `;
    });
}

// Load today's tasks from API
function loadTodayTasks() {
    fetch('{{ API_URL }}/today/tasks', {
        method: 'GET',
        headers: {
            'Authorization': 'Bearer ' + getAuthToken()
        }
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        return response.json();
    })
    .then(tasks => {
        displayTasks(tasks);
    })
    .catch(error => {
        console.error('Error loading tasks:', error);
        document.getElementById('today-tasks').innerHTML = `
            <div class="ui negative message">
                <div class="header">Error Loading Tasks</div>
                <p>Could not load today's tasks. Please try again later.</p>
            </div>
        `;
    });
}

// Load today's catchlist from API
function loadTodayCatchlist() {
    fetch('{{ API_URL }}/today/catchlist', {
        method: 'GET',
        headers: {
            'Authorization': 'Bearer ' + getAuthToken()
        }
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        return response.json();
    })
    .then(catchlist => {
        displayCatchlist(catchlist);
    })
    .catch(error => {
        console.error('Error loading catchlist:', error);
        document.getElementById('today-catchlist').innerHTML = `
            <div class="ui negative message">
                <div class="header">Error Loading Catchlist</div>
                <p>Could not load today's catchlist. Please try again later.</p>
            </div>
        `;
    });
}

// Display events in the UI
function displayEvents(events) {
    const todayItems = document.getElementById('today-items');
    todayItems.innerHTML = '';
    
    if (events.length === 0) {
        todayItems.innerHTML = `
            <div class="ui message">
                <div class="header">No Events Scheduled</div>
                <p>You don't have any events scheduled for today.</p>
            </div>
        `;
        
        // Update current activity section
        document.getElementById('current-activity-container').innerHTML = `
            <div class="ui message">
                <div class="header">No Current Activity</div>
                <p>There are no scheduled activities at this time.</p>
            </div>
        `;
        return;
    }
    
    // Find all-day events and current events
    const allDayEvents = events.filter(event => event.is_all_day);
    const currentTimeEvents = events.filter(event => event.is_current && !event.is_all_day);
    
    // Display the most relevant current activity
    // Priority: current time-based event, or first all-day event if no current time-based event
    const currentActivity = currentTimeEvents.length > 0 ? currentTimeEvents[0] : 
                            (allDayEvents.length > 0 ? allDayEvents[0] : null);
    
    if (currentActivity) {
        const isAllDay = currentActivity.is_all_day;
        const checkInCount = currentActivity.check_in_count || 0;
        const rpe = currentActivity.rpe ? `<div class="ui orange label">RPE: ${currentActivity.rpe}/10</div>` : '';
        document.getElementById('current-activity-container').innerHTML = `
            <div class="ui card fluid" data-id="${currentActivity.id}">
                <div class="content">
                    <div class="header">${currentActivity.summary}</div>
                    <div class="meta">
                        <span class="time">${isAllDay ? 'All day' : `${currentActivity.start_time || ''} - ${currentActivity.end_time || ''}`}</span>
                    </div>
                    <div class="description">${currentActivity.description || ''}</div>
                    ${currentActivity.notes ? `<div class="ui message">${currentActivity.notes}</div>` : ''}
                    <div class="extra">
                        ${checkInCount > 0 ? `<div class="ui teal label">Check-ins: ${checkInCount} (${checkInCount * 10} points)</div>` : ''}
                        ${rpe}
                    </div>
                </div>
                <div class="extra content">
                    <div class="ui two buttons">
                        <button class="ui blue button check-in-button">
                            ${checkInCount > 0 ? `Check In Again (+10 points)` : 'Check In (+10 points)'}
                        </button>
                        <button class="ui green button add-comment-button" data-type="event_execution" data-id="${currentActivity.id}">
                            <i class="comment icon"></i> Comment
                        </button>
                    </div>
                </div>
            </div>
        `;
        
        // Add check-in button handler
        document.querySelector('.check-in-button').addEventListener('click', function() {
            const executionId = this.closest('.card').dataset.id;
            if (!executionId) {
                console.error('Missing execution ID');
                alert('Error: Unable to check in. Missing execution ID.');
                return;
            }
            showCheckInModal(executionId);
        });
        
        // Add comment button handler
        document.querySelector('.add-comment-button').addEventListener('click', function() {
            openCommentsModal('event_execution', currentActivity.id, currentActivity.summary);
        });
    } else {
        document.getElementById('current-activity-container').innerHTML = `
            <div class="ui message">
                <div class="header">No Current Activity</div>
                <p>There are no scheduled activities at this time.</p>
            </div>
        `;
    }
    
    // Display all events
    events.forEach(event => {
        const isAllDay = event.is_all_day;
        const checkInCount = event.check_in_count || 0;
        const rpe = event.rpe ? `<div class="ui orange label">RPE: ${event.rpe}/10</div>` : '';
        const isCurrent = event.is_current ? 'current-event' : '';
        
        const eventEl = document.createElement('div');
        eventEl.className = `item ${isCurrent}`;
        eventEl.dataset.id = event.id;
        
        eventEl.innerHTML = `
            <div class="content">
                <div class="header">${event.summary}</div>
                <div class="meta">
                    <span class="time">${isAllDay ? 'All day' : `${event.start_time || ''} - ${event.end_time || ''}`}</span>
                </div>
                <div class="description">${event.description || ''}</div>
                ${event.notes ? `<div class="ui message">${event.notes}</div>` : ''}
                <div class="extra">
                    ${checkInCount > 0 ? `<div class="ui teal label">Check-ins: ${checkInCount} (${checkInCount * 10} points)</div>` : ''}
                    ${rpe}
                    <div class="ui right floated buttons">
                        <button class="ui mini blue button check-in-button">
                            ${checkInCount > 0 ? `Check In Again` : 'Check In'}
                        </button>
                        <button class="ui mini green button add-comment-button" data-type="event_execution" data-id="${event.id}">
                            <i class="comment icon"></i> Comment
                        </button>
                    </div>
                </div>
            </div>
        `;
        
        todayItems.appendChild(eventEl);
        
        // Add check-in button handler
        eventEl.querySelector('.check-in-button').addEventListener('click', function() {
            const executionId = this.closest('.item').dataset.id;
            if (!executionId) {
                console.error('Missing execution ID');
                alert('Error: Unable to check in. Missing execution ID.');
                return;
            }
            showCheckInModal(executionId);
        });
        
        // Add comment button handler
        eventEl.querySelector('.add-comment-button').addEventListener('click', function() {
            openCommentsModal('event_execution', event.id, event.summary);
        });
    });
}

// Display tasks in the UI
function displayTasks(tasks) {
    const todayTasks = document.getElementById('today-tasks');
    todayTasks.innerHTML = '';
    
    if (tasks.length === 0) {
        todayTasks.innerHTML = `
            <div class="ui message">
                <div class="header">No Tasks</div>
                <p>You don't have any tasks scheduled for today.</p>
            </div>
        `;
        return;
    }
    
    tasks.forEach(task => {
        const taskEl = document.createElement('div');
        taskEl.className = 'item';
        taskEl.dataset.id = task.id;
        
        taskEl.innerHTML = `
            <div class="content">
                <div class="header">${task.title}</div>
                <div class="meta">${task.project_title}</div>
                <div class="extra">
                    <div class="ui checkbox">
                        <input type="checkbox" ${task.complete ? 'checked' : ''}>
                        <label>${task.complete ? 'Completed' : 'Mark as complete'}</label>
                    </div>
                    <button class="ui mini green button right floated add-comment-button" data-type="project_subtask" data-id="${task.id}">
                        <i class="comment icon"></i> Comment
                    </button>
                </div>
            </div>
        `;
        
        todayTasks.appendChild(taskEl);
        
        // Initialize checkbox
        $(taskEl).find('.ui.checkbox').checkbox({
            onChange: function() {
                const taskId = taskEl.dataset.id;
                toggleTaskCompletion(taskId);
            }
        });
        
        // Add comment button handler
        taskEl.querySelector('.add-comment-button').addEventListener('click', function() {
            openCommentsModal('project_subtask', task.id, task.title);
        });
    });
}

// Display catchlist items in the UI
function displayCatchlist(items) {
    const todayCatchlist = document.getElementById('today-catchlist');
    todayCatchlist.innerHTML = '';
    
    if (items.length === 0) {
        todayCatchlist.innerHTML = `
            <div class="ui message">
                <div class="header">No Catchlist Items</div>
                <p>You don't have any catchlist items added to today's list.</p>
            </div>
        `;
        return;
    }
    
    items.forEach(item => {
        const itemEl = document.createElement('div');
        itemEl.className = 'item';
        itemEl.dataset.id = item.id;
        
        itemEl.innerHTML = `
            <div class="content">
                <div class="header">${item.content}</div>
                <div class="meta">${item.created_at}</div>
                <div class="extra">
                    <button class="ui mini teal button mark-done-button">Mark as Done</button>
                    <button class="ui mini green button right floated add-comment-button" data-type="catchlist_entry" data-id="${item.id}">
                        <i class="comment icon"></i> Comment
                    </button>
                </div>
            </div>
        `;
        
        todayCatchlist.appendChild(itemEl);
        
        // Add mark done button handler
        itemEl.querySelector('.mark-done-button').addEventListener('click', function() {
            const itemId = this.closest('.item').dataset.id;
            markCatchlistItemDone(itemId);
        });
        
        // Add comment button handler
        itemEl.querySelector('.add-comment-button').addEventListener('click', function() {
            openCommentsModal('catchlist_entry', item.id, item.content);
        });
    });
}

// Toggle task completion
function toggleTaskCompletion(taskId) {
    fetch(`{{ API_URL }}/today/tasks/${taskId}/toggle`, {
        method: 'POST',
        headers: {
            'Authorization': 'Bearer ' + getAuthToken()
        }
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        return response.json();
    })
    .then(data => {
        // Optionally update UI based on the response
        console.log('Task toggled:', data);
    })
    .catch(error => {
        console.error('Error toggling task:', error);
        alert('Could not update task. Please try again later.');
        // Revert the checkbox
        const checkbox = document.querySelector(`.item[data-id="${taskId}"] .ui.checkbox`);
        if (checkbox) {
            $(checkbox).checkbox('toggle');
        }
    });
}

// Mark catchlist item as done
function markCatchlistItemDone(itemId) {
    fetch(`{{ API_URL }}/catchlist/${itemId}/mark-done`, {
        method: 'POST',
        headers: {
            'Authorization': 'Bearer ' + getAuthToken()
        }
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        return response.json();
    })
    .then(data => {
        // Remove the item from today's list
        const itemEl = document.querySelector(`.item[data-id="${itemId}"]`);
        if (itemEl) {
            itemEl.remove();
        }
        
        // Check if no items left
        if (document.getElementById('today-catchlist').children.length === 0) {
            document.getElementById('today-catchlist').innerHTML = `
                <div class="ui message">
                    <div class="header">No Catchlist Items</div>
                    <p>You don't have any catchlist items added to today's list.</p>
                </div>
            `;
        }
    })
    .catch(error => {
        console.error('Error marking item as done:', error);
        alert('Could not mark item as done. Please try again later.');
    });
}

// Show the event check-in modal
function showCheckInModal(executionId) {
    const modalId = 'check-in-modal';
    
    // Create modal if it doesn't exist
    if (!document.getElementById(modalId)) {
        const modal = document.createElement('div');
        modal.className = 'ui modal';
        modal.id = modalId;
        
        modal.innerHTML = `
            <i class="close icon"></i>
            <div class="header">Check In</div>
            <div class="content">
                <form class="ui form">
                    <div class="field">
                        <label>RPE (Rate of Perceived Exertion) 1-10:</label>
                        <select name="rpe" class="ui dropdown">
                            <option value="">Optional</option>
                            ${Array.from({length: 10}, (_, i) => `<option value="${i+1}">${i+1}</option>`).join('')}
                        </select>
                    </div>
                    <div class="field">
                        <label>Notes:</label>
                        <textarea name="notes" placeholder="Optional notes about your session..."></textarea>
                    </div>
                </form>
            </div>
            <div class="actions">
                <div class="ui cancel button">Cancel</div>
                <div class="ui positive button">Check In</div>
            </div>
        `;
        
        document.body.appendChild(modal);
    }
    
    // Get the modal
    const modal = document.getElementById(modalId);
    
    // Set up the check-in button
    const positiveButton = modal.querySelector('.ui.positive.button');
    positiveButton.onclick = function() {
        const rpe = modal.querySelector('select[name="rpe"]').value;
        const notes = modal.querySelector('textarea[name="notes"]').value;
        
        checkInEvent(executionId, rpe, notes);
        $(modal).modal('hide');
    };
    
    // Show the modal
    $(modal).modal('show');
}

// Check in for an event
function checkInEvent(executionId, rpe, notes) {
    if (!executionId) {
        console.error('Missing execution ID');
        alert('Error: Unable to check in. Missing execution ID.');
        return;
    }
    
    const data = {};
    
    if (rpe) {
        data.rpe = parseInt(rpe);
    }
    
    if (notes) {
        data.notes = notes;
    }
    
    fetch(`{{ API_URL }}/today/event-check-in/${executionId}`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + getAuthToken()
        },
        body: JSON.stringify(data)
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        return response.json();
    })
    .then(data => {
        // Reload events after successful check-in
        loadTodayEvents();
    })
    .catch(error => {
        console.error('Error checking in:', error);
        alert('Could not check in. Please try again later.');
    });
}

// Calculate stats
function calculateStats(events) {
    let totalPoints = 0;
    let streak = 0;
    let completed = 0;
    let total = events.length;
    
    events.forEach(event => {
        const checkInCount = event.check_in_count || 0;
        totalPoints += checkInCount * 10;
        
        if (event.completed === 'yes') {
            completed++;
        }
    });
    
    // Calculate completion rate
    const completionRate = total > 0 ? Math.round((completed / total) * 100) : 0;
    
    // Update stats in UI
    document.getElementById('points').textContent = totalPoints;
    document.getElementById('streak').textContent = streak;
    document.getElementById('completion-rate').textContent = `${completionRate}%`;
}

// Load weekly report
function loadWeeklyReport(endDate) {
    // If no end date provided, use the current date and adjust to the nearest Saturday
    if (!endDate) {
        const today = new Date();
        const dayOfWeek = today.getDay();
        if (dayOfWeek !== 6) { // 6 is Saturday
            const daysToSaturday = dayOfWeek === 0 ? -1 : 6 - dayOfWeek;
            today.setDate(today.getDate() + daysToSaturday);
        }
        endDate = formatDateForAPI(today);
    }
    
    // Save the current report date
    currentReportEndDate = endDate;
    
    const url = `{{ API_URL }}/reports/weekly?end_date=${endDate}`;
    
    fetch(url, {
        method: 'GET',
        headers: {
            'Authorization': 'Bearer ' + getAuthToken()
        }
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        return response.json();
    })
    .then(report => {
        displayWeeklyReport(report);
        $('#weekly-report-modal').modal('show');
        
        // Update the "Next Week" button - disable if we're at the current week
        const today = new Date();
        const reportEndDate = new Date(report.period.end_date);
        const nextWeekBtn = document.getElementById('next-week-btn');
        
        if (reportEndDate >= today) {
            nextWeekBtn.classList.add('disabled');
        } else {
            nextWeekBtn.classList.remove('disabled');
        }
    })
    .catch(error => {
        console.error('Error loading weekly report:', error);
        alert('Could not load weekly report. Please try again later.');
    });
}

// Display weekly report
function displayWeeklyReport(report) {
    const content = document.getElementById('weekly-report-content');
    
    // Format the report period - ensure we display Sunday to Saturday
    const startDate = new Date(report.period.start_date);
    const endDate = new Date(report.period.end_date);
    
    // Verify that startDate is a Sunday and endDate is a Saturday
    const isStartSunday = startDate.getDay() === 0;
    const isEndSaturday = endDate.getDay() === 6;
    
    // Format dates in a user-friendly way (e.g., "May 3, 2023")
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    const formattedStartDate = startDate.toLocaleDateString(undefined, options);
    const formattedEndDate = endDate.toLocaleDateString(undefined, options);
    
    let html = `
        <div class="ui segment">
            <h3>Week of ${formattedStartDate} to ${formattedEndDate}</h3>
            ${!isStartSunday || !isEndSaturday ? 
                `<div class="ui warning message">Note: This report may not cover a complete Sunday-to-Saturday week.</div>` : ''}
            
            <div class="ui statistics">
                <div class="statistic">
                    <div class="value">${report.checkins.total}</div>
                    <div class="label">Total Check-ins</div>
                </div>
                <div class="statistic">
                    <div class="value">${report.completed_tasks.total}</div>
                    <div class="label">Completed Tasks</div>
                </div>
                <div class="statistic">
                    <div class="value">${report.completed_catchlist.total}</div>
                    <div class="label">Completed Catchlist</div>
                </div>
                <div class="statistic">
                    <div class="value">${report.average_rpe || 'N/A'}</div>
                    <div class="label">Avg RPE</div>
                </div>
            </div>
        </div>
        
        <h4 class="ui header">Projects</h4>
        <div class="ui list">
    `;
    
    // Add projects
    report.projects.forEach(project => {
        html += `
            <div class="item">
                <div class="content">
                    <div class="header">${project.title}</div>
                    <div class="description">
                        <div class="ui indicating progress" data-percent="${project.completion_percentage}">
                            <div class="bar" style="width:${project.completion_percentage}%"></div>
                            <div class="label">${project.completed_subtasks} of ${project.total_subtasks} tasks (${project.completion_percentage}%)</div>
                        </div>
                    </div>
                </div>
            </div>
        `;
    });
    
    html += `
        </div>
        
        <h4 class="ui header">Daily Activity</h4>
        <table class="ui celled table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Check-ins</th>
                    <th>Tasks</th>
                    <th>Catchlist</th>
                    <th>Avg RPE</th>
                </tr>
            </thead>
            <tbody>
    `;
    
    // Add daily stats
    Object.keys(report.daily_stats).sort().forEach(date => {
        const stats = report.daily_stats[date];
        const displayDate = new Date(date).toLocaleDateString();
        
        html += `
            <tr>
                <td>${displayDate}</td>
                <td>${stats.checkins || 0}</td>
                <td>${stats.completed_tasks || 0}</td>
                <td>${stats.completed_catchlist || 0}</td>
                <td>${stats.average_rpe || 'N/A'}</td>
            </tr>
        `;
    });
    
    html += `
            </tbody>
        </table>
        
        <div class="ui button view-comments-report">View Comments Report</div>
    `;
    
    content.innerHTML = html;
    
    // Initialize progress bars
    $('.ui.progress').progress();
    
    // Add comments report button handler
    document.querySelector('.view-comments-report').addEventListener('click', function() {
        $('#weekly-report-modal').modal('hide');
        loadCommentsReport();
    });
}

// Load comments report
function loadCommentsReport() {
    fetch('{{ API_URL }}/reports/comments', {
        method: 'GET',
        headers: {
            'Authorization': 'Bearer ' + getAuthToken()
        }
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Network response was not ok');
        }
        return response.json();
    })
    .then(comments => {
        displayCommentsReport(comments);
    })
    .catch(error => {
        console.error('Error loading comments report:', error);
        alert('Could not load comments report. Please try again later.');
    });
}

// Display comments report
function displayCommentsReport(comments) {
    const modalId = 'comments-report-modal';
    
    // Create modal if it doesn't exist
    if (!document.getElementById(modalId)) {
        const modal = document.createElement('div');
        modal.className = 'ui modal';
        modal.id = modalId;
        
        modal.innerHTML = `
            <i class="close icon"></i>
            <div class="header">Comments Report</div>
            <div class="content" id="comments-report-content"></div>
        `;
        
        document.body.appendChild(modal);
    }
    
    // Get the modal content
    const content = document.getElementById('comments-report-content');
    
    if (comments.length === 0) {
        content.innerHTML = `
            <div class="ui message">
                <div class="header">No Comments</div>
                <p>You haven't added any comments in the past week.</p>
            </div>
        `;
    } else {
        content.innerHTML = `
            <div class="ui comments">
                <h3 class="ui dividing header">Recent Comments</h3>
        `;
        
        comments.forEach(comment => {
            let entityInfo = '';
            
            if (comment.entity_details) {
                if (comment.entity_type === 'event_execution') {
                    entityInfo = `${comment.entity_details.summary} (${comment.entity_details.execution_date})`;
                } else if (comment.entity_type === 'project_subtask') {
                    entityInfo = `${comment.entity_details.title} (${comment.entity_details.project_title})`;
                } else if (comment.entity_type === 'catchlist_entry') {
                    entityInfo = comment.entity_details.content;
                }
            }
            
            content.innerHTML += `
                <div class="comment">
                    <div class="content">
                        <div class="author">You</div>
                        <div class="metadata">
                            <div class="date">${comment.created_at}</div>
                            ${comment.rpe ? `<span class="ui mini label">RPE: ${comment.rpe}/10</span>` : ''}
                        </div>
                        <div class="text">${comment.content}</div>
                        <div class="metadata">
                            <span class="entity-info">${entityInfo}</span>
                        </div>
                    </div>
                </div>
            `;
        });
        
        content.innerHTML += `</div>`;
    }
    
    // Show the modal
    $('#comments-report-modal').modal('show');
}

// Open comments modal
function openCommentsModal(entityType, entityId, title) {
    const modal = document.getElementById('comments-modal');
    const modalTitle = document.getElementById('comments-modal-title');
    const modalContent = document.getElementById('comments-modal-content');
    
    // Set the title
    modalTitle.textContent = `Comments for ${title}`;
    
    // Show loading state
    modalContent.innerHTML = `
        <div class="ui active dimmer">
            <div class="ui loader"></div>
        </div>
    `;
    
    // Show the modal
    $('#comments-modal').modal('show');
    
    // Create unique container ID
    const containerId = `modal-comments-${entityType}-${entityId}`;
    
    // Set up container
    modalContent.innerHTML = `<div id="${containerId}"></div>`;
    
    // Initialize comments
    initializeComments(entityType, entityId, `#${containerId}`);
}
</script>
{% endblock %}
