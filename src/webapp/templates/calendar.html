{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h1>Calendar Integration</h1>

    <div class="card mb-4">
        <div class="card-header">
            Connect to CalDAV Server
        </div>
        <div class="card-body">
            <form id="caldav-form">
                <div class="mb-3">
                    <label for="caldav-url" class="form-label">CalDAV URL</label>
                    <input type="text" class="form-control" id="caldav-url" required
                           placeholder="https://your-caldav-server.com/path/to/calendar">
                </div>
                <div class="mb-3">
                    <label for="caldav-username" class="form-label">Username (optional)</label>
                    <input type="text" class="form-control" id="caldav-username">
                </div>
                <div class="mb-3">
                    <label for="caldav-password" class="form-label">Password (optional)</label>
                    <input type="password" class="form-control" id="caldav-password">
                </div>
                <button type="submit" class="btn btn-primary">Test Connection</button>
            </form>
        </div>
    </div>

    <div id="connection-result" class="d-none">
        <div class="card mb-4">
            <div class="card-header">
                Connection Results
            </div>
            <div class="card-body">
                <div id="result-message"></div>

                <div id="calendars-container" class="mt-3 d-none">
                    <h5>Available Calendars:</h5>
                    <ul id="calendars-list"></ul>
                </div>

                <div id="events-container" class="mt-3 d-none">
                    <h5>Sample Events:</h5>
                    <ul id="events-list"></ul>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const API_URL = "{{ API_URL }}";

document.getElementById('caldav-form').addEventListener('submit', function(e) {
    e.preventDefault();

    const url = document.getElementById('caldav-url').value;
    const username = document.getElementById('caldav-username').value;
    const password = document.getElementById('caldav-password').value;

    // Clear previous results
    document.getElementById('result-message').innerHTML = '';
    document.getElementById('calendars-list').innerHTML = '';
    document.getElementById('events-list').innerHTML = '';
    document.getElementById('calendars-container').classList.add('d-none');
    document.getElementById('events-container').classList.add('d-none');

    // Show loading message
    document.getElementById('connection-result').classList.remove('d-none');
    document.getElementById('result-message').innerHTML = '<div class="alert alert-info">Testing connection...</div>';

    // Send request to API
    fetch(`${API_URL}/caldav/test-connection`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + getCookie('auth_token')
        },
        body: JSON.stringify({
            url: url,
            username: username || null,
            password: password || null
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            document.getElementById('result-message').innerHTML =
                `<div class="alert alert-success">${data.message}</div>`;

            // Display calendars if any
            if (data.calendars && data.calendars.length > 0) {
                document.getElementById('calendars-container').classList.remove('d-none');
                const calendarsList = document.getElementById('calendars-list');

                data.calendars.forEach(calendar => {
                    const li = document.createElement('li');
                    li.textContent = calendar;
                    calendarsList.appendChild(li);
                });
            }

            // Display sample events if any
            if (data.sample_events && data.sample_events.length > 0) {
                document.getElementById('events-container').classList.remove('d-none');
                const eventsList = document.getElementById('events-list');

                data.sample_events.forEach(event => {
                    const li = document.createElement('li');
                    li.innerHTML = `<strong>${event.summary}</strong>:
                                    ${new Date(event.start).toLocaleString()} -
                                    ${new Date(event.end).toLocaleString()}`;
                    eventsList.appendChild(li);
                });
            }
        } else {
            document.getElementById('result-message').innerHTML =
                `<div class="alert alert-danger">${data.message}</div>`;
        }
    })
    .catch(error => {
        document.getElementById('result-message').innerHTML =
            `<div class="alert alert-danger">Error: ${error.message}</div>`;
    });
});

function getCookie(name) {
    const value = `; ${document.cookie}`;
    const parts = value.split(`; ${name}=`);
    if (parts.length === 2) return parts.pop().split(';').shift();
}
</script>
{% endblock %}
