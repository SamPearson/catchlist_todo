{% extends "base.html" %}

{% block content %}
<div class="ui container">
    <h1 class="ui header">My Todo List</h1>
    
    <div class="ui segment">
        <form class="ui form" id="add-todo-form">
            <div class="field">
                <div class="ui action input">
                    <input type="text" name="title" placeholder="Add a new todo..." required>
                    <button class="ui teal button" type="submit">Add</button>
                </div>
            </div>
        </form>
    </div>

    <div class="ui divided items" id="todo-list">
        {% for todo in todo_list %}
        <div class="item" data-id="{{ todo.id }}">
            <div class="content">
                <div class="header">
                    <div class="ui {% if todo.complete %}green{% endif %} checkbox">
                        <input type="checkbox" {% if todo.complete %}checked{% endif %}>
                        <label>{{ todo.title }}</label>
                    </div>
                </div>
                <div class="description">
                    <button class="ui red tiny button delete-todo">Delete</button>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script>
function showError(message) {
    const errorDiv = document.getElementById('error-message');
    if (!errorDiv) {
        return;
    }
    const errorText = errorDiv.querySelector('.error-text');
    errorText.textContent = message;
    errorDiv.style.display = 'block';
    errorDiv.classList.add('visible');
    
    // Auto-hide after 5 seconds
    setTimeout(() => {
        errorDiv.style.display = 'none';
        errorDiv.classList.remove('visible');
    }, 5000);
}

// Add todo form submission
const addForm = document.getElementById('add-todo-form');
if (addForm) {
    addForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(e.target);
        const data = {
            title: formData.get('title')
        };

        fetch('/todos', {
            method: 'POST',
            headers: getAuthHeaders(),
            body: JSON.stringify(data)
        })
        .then(response => response.json())
        .then(data => {
            window.location.reload();
        })
        .catch(error => {
            showError('Failed to add todo');
        });
    });
}

// Handle todo completion toggle
document.querySelectorAll('.ui.checkbox input').forEach(checkbox => {
    checkbox.addEventListener('change', function() {
        const todoItem = this.closest('.item');
        const todoId = todoItem.dataset.id;
        const complete = this.checked;
        const title = this.parentNode.querySelector('label').textContent;
        
        // Update the checkbox UI immediately
        if (complete) {
            this.closest('.ui.checkbox').classList.add('green');
        } else {
            this.closest('.ui.checkbox').classList.remove('green');
        }
        
        fetch(`/todos/${todoId}`, {
            method: 'PUT',
            headers: getAuthHeaders(),
            body: JSON.stringify({ 
                title: title,
                complete: complete 
            })
        })
        .then(response => response.json())
        .catch(error => {
            showError('Failed to update todo');
            // Revert the UI if there was an error
            this.checked = !complete;
            if (!complete) {
                this.closest('.ui.checkbox').classList.add('green');
            } else {
                this.closest('.ui.checkbox').classList.remove('green');
            }
        });
    });
});

// Handle todo deletion
document.querySelectorAll('.delete-todo').forEach(button => {
    button.addEventListener('click', function() {
        const todoItem = this.closest('.item');
        const todoId = todoItem.dataset.id;
        
        fetch(`/todos/${todoId}`, {
            method: 'DELETE',
            headers: getAuthHeaders()
        })
        .then(response => {
            if (response.ok) {
                todoItem.remove();
            } else {
                throw new Error('Failed to delete todo');
            }
        })
        .catch(error => {
            showError('Failed to delete todo');
        });
    });
});
</script>

<style>
.ui.error.message {
    transition: all 0.3s ease-in-out;
    opacity: 0;
    transform: translateY(-10px);
}

.ui.error.message.visible {
    opacity: 1;
    transform: translateY(0);
}

.ui.checkbox.green label {
    color: #21ba45;
}
</style>
{% endblock %}
