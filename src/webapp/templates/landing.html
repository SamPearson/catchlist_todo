{% extends "base.html" %}

{% block content %}
<div class="landing-container">
    <div class="image-container">
        <img src="{{ url_for('static', filename='images/tom.jpg') }}" alt="Welcome" class="landing-image">
        <div class="overlay">
            <h1 class="ui header">Welcome to Todo Manager</h1>
            <p class="subtitle">Organize your thoughts, one task at a time</p>
            <div class="button-container">
                <a href="/login" class="ui large teal button">Login</a>
                <a href="/register" class="ui large inverted teal button">Register</a>
            </div>
        </div>
    </div>
</div>

<style>
.landing-container {
    min-height: calc(100vh - 60px); /* Subtract header height */
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    background-color: #f8f9fa;
}

.image-container {
    position: relative;
    width: 100%;
    max-width: 800px;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.landing-image {
    width: 100%;
    height: auto;
    display: block;
}

.overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.7));
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
    text-align: center;
    color: white;
}

.overlay .ui.header {
    color: white;
    font-size: 2.5em;
    margin-bottom: 0.5em;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}

.subtitle {
    font-size: 1.2em;
    margin-bottom: 2em;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
}

.button-container {
    display: flex;
    gap: 1em;
}

.ui.teal.button {
    background-color: #00b5ad;
    color: white;
}

.ui.inverted.teal.button {
    background-color: transparent;
    border: 2px solid #00b5ad;
    color: white;
}

.ui.teal.button:hover {
    background-color: #008c85;
}

.ui.inverted.teal.button:hover {
    background-color: #00b5ad;
    color: white;
}
</style>
{% endblock %}
