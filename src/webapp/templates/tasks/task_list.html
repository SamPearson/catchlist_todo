
{% extends "bulma_base.html" %}

{% block content %}
<div class="container" x-data="tagManager">
    <h1 class="title">Tasks</h1>

    <!-- Task Creation Form -->
    <div class="box">
        <form method="POST" action="{{ url_for('tasks.create_task') }}">
            <div class="field has-addons">
                <div class="control is-expanded">
                    <input class="input" type="text" name="content" placeholder="Add a new task..." required>
                </div>
                <div class="control">
                    <button type="submit" class="button is-primary">Add</button>
                </div>
            </div>
        </form>
    </div>

    <!-- Search/Filter Form -->
    <div class="box">
        <form method="GET" action="{{ url_for('tasks.task_list') }}">
            <div class="field">
                <div class="control">
                    <label class="checkbox">
                        <input type="checkbox" name="include_completed" value="true"
                               {% if request.args.get('include_completed') == 'true' %}checked{% endif %}
                               onchange="this.form.submit()">
                        Show completed tasks
                    </label>
                </div>
            </div>
        </form>
    </div>

    <!-- Task List -->
    <div class="box">
        <div class="content">
            {% for task in tasks %}
            <div class="task-item">
                <div class="level">
                    <div class="level-left">
                        <div class="level-item">
                            <form action="{{ url_for('tasks.handle_task', task_id=task.id) }}" method="POST">
                                <input type="hidden" name="_method" value="PUT">
                                <label class="checkbox">
                                    <input type="checkbox" name="completed" value="true"
                                           {% if task.completed %}checked{% endif %}
                                           onchange="this.form.submit()">
                                    {{ task.content }}
                                </label>
                            </form>
                        </div>
                        <!-- Tag Manager Button -->
                        <div class="level-item">
                            <button class="button is-small"
                                    @click="openTagModal('{{ task.id }}', '{{ task.content }}')"
                                    title="Manage Tags">
                                <span class="icon is-small">
                                    <i class="fas fa-tags"></i>
                                </span>
                            </button>
                        </div>
                    </div>
                    <div class="level-right">
                        <div class="level-item">
                            <form action="{{ url_for('tasks.handle_task', task_id=task.id) }}" method="POST">
                                <input type="hidden" name="_method" value="DELETE">
                                <button class="delete" type="submit"
                                        onclick="return confirm('Are you sure you want to delete this task?')">
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <!-- Tag Manager Modal -->
    <div class="modal" :class="{ 'is-active': isModalOpen }">
        <div class="modal-background" @click="closeTagModal"></div>
        <div class="modal-card">
            <header class="modal-card-head">
                <p class="modal-card-title">Manage Tags for Task: <span x-text="currentTaskName"></span></p>
                <button class="delete" aria-label="close" @click="closeTagModal"></button>
            </header>
            <section class="modal-card-body">
                <p>Task ID: <span x-text="currentTaskId"></span></p>
                <p>This modal will eventually show and manage tags for this task.</p>
            </section>
            <footer class="modal-card-foot">
                <button class="button" @click="closeTagModal">Close</button>
            </footer>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('tagManager', () => ({
            isModalOpen: false,
            currentTaskId: null,
            currentTaskName: '',

            openTagModal(taskId, taskName) {
                console.log('Opening modal for task:', taskId, taskName);
                this.currentTaskId = taskId;
                this.currentTaskName = taskName;
                this.isModalOpen = true;
            },

            closeTagModal() {
                this.isModalOpen = false;
            }
        }));
    });
</script>
{% endblock %}
