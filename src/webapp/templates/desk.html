{% block content %}

<script src="{{ url_for('static', filename='js/comments.js') }}"></script>
<script>
// Define global API_URL variable
const API_URL = '{{ API_URL }}';

// Set the API URL for comments.js
setApiUrl(API_URL);

// Function to get auth token from cookies
function getAuthToken() {
    const cookies = document.cookie.split(';');
    for (let i = 0; i < cookies.length; i++) {
        const cookie = cookies[i].trim();
        if (cookie.startsWith('auth_token=')) {
            return cookie.substring('auth_token='.length, cookie.length);
        }
    }
    return '';
}

// Initialize tabs
$(document).ready(function() {
    // Initialize Semantic UI tabs
    $('.menu .item').tab({
        onVisible: function(tabPath) {
            loadTabContent(tabPath);
        }
    });
    
    // Load initial content for the active tab
    const activeTab = $('.menu .item.active').data('tab');
    loadTabContent(activeTab);
});

// Function to load content for a specific tab
function loadTabContent(tab) {
    const token = getAuthToken();
    if (!token) {
        window.location.href = '/login';
        return;
    }

    let startDate, endDate;
    const today = new Date();
    
    // Calculate date range based on tab
    switch(tab) {
        case 'day':
            startDate = new Date(today);
            endDate = new Date(today);
            break;
        case 'week':
            startDate = new Date(today);
            endDate = new Date(today);
            endDate.setDate(today.getDate() + 6); // Next 7 days including today
            break;
        case 'month':
            startDate = new Date(today);
            endDate = new Date(today);
            endDate.setMonth(today.getMonth() + 1);
            break;
        case 'season':
            startDate = new Date(today);
            endDate = new Date(today);
            endDate.setMonth(today.getMonth() + 3);
            break;
        case 'year':
            startDate = new Date(today);
            endDate = new Date(today);
            endDate.setFullYear(today.getFullYear() + 1);
            break;
        case 'custom':
            // Show custom date modal
            $('#custom-date-modal').modal('show');
            return;
        case 'demo':
            // Load demo data
            loadDemoData();
            return;
    }

    // Format dates for API
    const formatDate = (date) => {
        return date.toISOString().split('T')[0];
    };

    // Show loading state
    document.getElementById('schedule-items').innerHTML = '<div class="ui active inverted dimmer"><div class="ui text loader">Loading schedule...</div></div>';
    document.getElementById('project-tasks').innerHTML = '<div class="ui active inverted dimmer"><div class="ui text loader">Loading project tasks...</div></div>';
    document.getElementById('catchlist-items').innerHTML = '<div class="ui active inverted dimmer"><div class="ui text loader">Loading catchlist items...</div></div>';

    // Load events for the date range
    fetch(`${API_URL}/routines/range?start=${formatDate(startDate)}&end=${formatDate(endDate)}`, {
        headers: {
            'Authorization': `Bearer ${token}`
        }
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Failed to load events');
        }
        return response.json();
    })
    .then(events => {
        displayEvents(events);
    })
    .catch(error => {
        console.error('Error loading events:', error);
        document.getElementById('schedule-items').innerHTML = '<div class="ui negative message">Failed to load events</div>';
    });

    // Load commitments for the date range
    fetch(`${API_URL}/commitments/range?start=${formatDate(startDate)}&end=${formatDate(endDate)}`, {
        headers: {
            'Authorization': `Bearer ${token}`
        }
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Failed to load commitments');
        }
        return response.json();
    })
    .then(commitments => {
        const projectTasks = commitments.filter(c => c.item_type === 'project_task');
        const catchlistItems = commitments.filter(c => c.item_type === 'catchlist_item');
        
        displayProjectTasks(projectTasks);
        displayCatchlistItems(catchlistItems);
    })
    .catch(error => {
        console.error('Error loading commitments:', error);
        showError('Failed to load commitments');
    });
}

// Function to display events
function displayEvents(events) {
    const container = document.getElementById('schedule-items');
    if (!container) return;

    let html = '';
    if (!events || events.length === 0) {
        html = '<div class="ui info message">No events scheduled for this period.</div>';
    } else {
        events.forEach(event => {
            const timeRange = event.start_time && event.end_time ? 
                `${event.start_time} - ${event.end_time}` : 
                'All day';
            
            html += `
                <div class="item" data-id="${event.id}">
                    <div class="content">
                        <div class="header">
                            ${event.title || 'Untitled Event'}
                            ${event.completed ? '<span class="ui blue label">Completed</span>' : ''}
                        </div>
                        <div class="meta">${timeRange}</div>
                        <div class="description">${event.description || ''}</div>
                        <div class="extra">
                            <div class="ui checkbox">
                                <input type="checkbox" ${event.completed ? 'checked' : ''} data-id="${event.id}">
                                <label>Complete</label>
                            </div>
                            <button class="ui tiny button add-checkin" data-id="${event.id}">
                                <i class="plus icon"></i> Add Checkin
                            </button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    container.innerHTML = html;
    initializeCommitmentControls(container);
}

                        </div>

                            Due: ${dueDate.toLocaleDateString()}
                            ${commitment.item?.project_name ? `<span class="ui label">${commitment.item.project_name}</span>` : ''}
                        </div>
                        <div class="description">${commitment.item?.description || ''}</div>
                        <div class="extra">
                            <div class="ui checkbox">
                                <input type="checkbox" ${commitment.completed ? 'checked' : ''} data-id="${commitment.id}">
                                <label>Complete</label>
                            </div>
                            <button class="ui tiny button add-checkin" data-id="${commitment.id}">
                                <i class="plus icon"></i> Add Checkin
                            </button>
                        </div>
                    </div>

                            Due: ${dueDate.toLocaleDateString()}

                        <div class="description">${commitment.item?.content || ''}</div>
                        <div class="extra">
                            <button class="ui tiny button add-checkin" data-id="${commitment.id}">

                        </div>
                    </div>
                </div>
            `;

    container.innerHTML = html;

}

// Function to show error message
function showError(message) {
    const container = document.querySelector('.ui.container');
    const errorDiv = document.createElement('div');
    errorDiv.className = 'ui negative message';
    errorDiv.innerHTML = `
        <i class="close icon"></i>
        <div class="header">Error</div>
        <p>${message}</p>
    `;
    container.insertBefore(errorDiv, container.firstChild);
    
    // Auto-remove after 5 seconds
    setTimeout(() => {
        errorDiv.remove();
    }, 5000);
}

// Handle custom date range
document.getElementById('apply-custom-date').addEventListener('click', function() {
    const form = document.getElementById('custom-date-form');
    const startDate = new Date(form.start_date.value);
    const endDate = new Date(form.end_date.value);
    
    if (startDate > endDate) {
        alert('Start date must be before end date');
        return;
    }
    
    $('#custom-date-modal').modal('hide');
    loadTabContent('custom');
});

// Load today's events when page loads
document.addEventListener('DOMContentLoaded', function() {
    loadTodayEvents();
    loadTodayCommitments();
    setupCheckinModal();
});

// Load today's events
function loadTodayEvents() {
    const token = getAuthToken();
    if (!token) {
        window.location.href = '/login';
        return;
    }

    fetch(`${API_URL}/routines/today`, {
        headers: {
            'Authorization': `Bearer ${token}`
        }
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Failed to load events');
        }
        return response.json();
    })
    .then(events => {
        displayTodayEvents(events);
        displayCurrentActivity(events);
    })
    .catch(error => {
        console.error('Error loading today\'s events:', error);
        document.getElementById('schedule-items').innerHTML = 
            '<div class="ui negative message"><div class="header">Error</div>Failed to load events</div>';
    });
}

// Display today's events
function displayTodayEvents(events) {
    const container = document.getElementById('schedule-items');
    
    if (!events || events.length === 0) {
        container.innerHTML = '<div class="ui info message">No events scheduled for today.</div>';
        return;
    }
    
    // Sort events by start time
    events.sort((a, b) => {
        const timeA = a.start_time || '23:59';
        const timeB = b.start_time || '23:59';
        return timeA.localeCompare(timeB);
    });
    
    // Create HTML for each event
    let html = '';
    events.forEach(event => {
        const timeRange = event.start_time && event.end_time ? 
            `${event.start_time} - ${event.end_time}` : 
            'All day';
        
        // Determine if the event is current
        const now = new Date();
        const currentHour = now.getHours();
        const currentMinute = now.getMinutes();
        const currentTimeStr = `${currentHour.toString().padStart(2, '0')}:${currentMinute.toString().padStart(2, '0')}`;
        
        const isCurrent = event.start_time && event.end_time ? 
            (currentTimeStr >= event.start_time && currentTimeStr <= event.end_time) : 
            true;
        
        html += `
        <div class="item ${isCurrent ? 'current-event' : ''}" data-id="${event.id}">
            <div class="content">
                <div class="header">
                    ${event.title || 'Untitled Event'}
                    ${isCurrent ? '<span class="ui green label">Current</span>' : ''}
                    ${event.completed ? '<span class="ui blue label">Completed</span>' : ''}
                </div>
                <div class="meta">${timeRange}</div>
                <div class="description">${event.description || ''}</div>
                <div class="extra">
                    <div class="ui checkbox">
                        <input type="checkbox" ${event.completed ? 'checked' : ''} data-id="${event.id}">
                        <label>Complete</label>
                    </div>
                    <button class="ui tiny button add-checkin" data-id="${event.id}">
                        <i class="plus icon"></i> Add Checkin
                    </button>
                    <div class="ui tiny buttons">
                        <button class="ui button view-checkins" data-id="${event.id}">
                            <i class="list icon"></i> Checkins
                        </button>
                    </div>
                </div>
                <div class="checkins-list" id="checkins-${event.id}" style="display: none;">
                    <!-- Checkins will be loaded here -->
                </div>
            </div>
        </div>`;
    });
    
    container.innerHTML = html;
    
    // Initialize commitment controls for the new items
    initializeCommitmentControls(container);
}

// Display current activity
function displayCurrentActivity(events) {
    const container = document.getElementById('current-activity-container');
    const now = new Date();
    const currentHour = now.getHours();
    const currentMinute = now.getMinutes();
    const currentTimeStr = `${currentHour.toString().padStart(2, '0')}:${currentMinute.toString().padStart(2, '0')}`;
    
    // Filter events to find the current one
    const currentEvent = events.find(event => {
        if (event.start_time === '00:00') {
            return true; // All day events are always current
        }
        if (!event.start_time || !event.end_time) {
            return true; // Events without time are considered all day
        }
        return currentTimeStr >= event.start_time && currentTimeStr <= event.end_time;
    });
    
    if (currentEvent) {
        const timeRange = currentEvent.start_time && currentEvent.end_time && currentEvent.start_time !== '00:00' ? 
            `${currentEvent.start_time} - ${currentEvent.end_time}` : 
            'All day';
        
        container.innerHTML = `
        <div class="ui items">
            <div class="item">
                <div class="content">
                    <div class="header">${currentEvent.title || 'Untitled Event'}</div>
                    <div class="meta">${timeRange}</div>
                    <div class="description">${currentEvent.description || ''}</div>
                    <div class="extra">
                        <div class="ui checkbox">
                            <input type="checkbox" ${currentEvent.completed ? 'checked' : ''} data-id="${currentEvent.id}">
                            <label>Complete</label>
                        </div>
                        <button class="ui tiny button add-checkin" data-id="${currentEvent.id}">
                            <i class="plus icon"></i> Add Checkin
                        </button>
                        <div class="ui tiny buttons">
                            <button class="ui button view-checkins" data-id="${currentEvent.id}">
                                <i class="list icon"></i> Checkins
                            </button>
                        </div>
                    </div>
                    <div class="checkins-list" id="checkins-${currentEvent.id}" style="display: none;">
                        <!-- Checkins will be loaded here -->
                    </div>
                </div>
            </div>
        </div>`;
        
        // Initialize commitment controls for the current activity
        initializeCommitmentControls(container);
    } else {
        container.innerHTML = '<div class="ui info message">No activities currently in progress.</div>';
    }
}

// Load today's commitments
function loadTodayCommitments() {
    const token = getAuthToken();
    if (!token) {
        window.location.href = '/login';
        return;
    }

    fetch(`${API_URL}/commitments/today`, {
        headers: {
            'Authorization': `Bearer ${token}`
        }
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Failed to load commitments');
        }
        return response.json();
    })
    .then(commitments => {
        // Split commitments into project tasks and catchlist items
        const projectTasks = commitments.filter(c => c.item_type === 'project_task');
        const catchlistItems = commitments.filter(c => c.item_type === 'catchlist_item');
        
        displayProjectTasks(projectTasks);
        displayCatchlistItems(catchlistItems);
    })
    .catch(error => {
        console.error('Error loading commitments:', error);
        document.getElementById('project-tasks').innerHTML = 
            '<div class="ui negative message"><div class="header">Error</div>Failed to load commitments</div>';
        document.getElementById('catchlist-items').innerHTML = 
            '<div class="ui negative message"><div class="header">Error</div>Failed to load commitments</div>';
    });
}

// Initialize commitment controls (checkboxes, checkin buttons, etc.)
function initializeCommitmentControls(container) {
    // Initialize checkboxes
    container.querySelectorAll('.ui.checkbox').forEach(checkbox => {
        $(checkbox).checkbox({
            onChange: function() {
                const commitmentId = this.querySelector('input').getAttribute('data-id');
                const completed = this.querySelector('input').checked;
                updateCommitmentCompletion(commitmentId, completed);
            }
        });
    });
    
    // Add click handlers for checkins
    container.querySelectorAll('.add-checkin').forEach(button => {
        button.addEventListener('click', function() {
            const id = this.getAttribute('data-id');
            showCheckinModal(id);
        });
    });
    
    // Add click handlers for viewing checkins
    container.querySelectorAll('.view-checkins').forEach(button => {
        button.addEventListener('click', function() {
            const id = this.getAttribute('data-id');
            toggleCheckinsList(id);
        });
    });
}

// Show checkin modal
function showCheckinModal(commitmentId) {
    document.getElementById('commitment-id').value = commitmentId;
    $('#checkin-modal').modal('show');
}

// Setup checkin modal
function setupCheckinModal() {
    // Initialize sliders
    initializeSlider('rpe-slider', 'rpe-value', 'rpe-label');
    initializeSlider('progress-slider', 'progress-value', 'progress-label', '%');
    initializeSlider('mood-slider', 'mood-value', 'mood-label');
    initializeSlider('energy-slider', 'energy-value', 'energy-label');
    
    // Add save handler
    document.getElementById('save-checkin').addEventListener('click', function() {
        saveCheckin();
    });
}

// Initialize slider
function initializeSlider(sliderId, valueId, labelId, suffix = '') {
    const slider = document.getElementById(sliderId);
    const value = document.getElementById(valueId);
    const label = document.getElementById(labelId);
    
    value.addEventListener('input', function() {
        label.textContent = this.value + suffix;
    });
}

// Save checkin
function saveCheckin() {
    const token = getAuthToken();
    if (!token) {
        window.location.href = '/login';
        return;
    }
    
    const commitmentId = document.getElementById('commitment-id').value;
    const data = {
        comment: document.getElementById('checkin-comment').value,
        rpe: parseInt(document.getElementById('rpe-value').value),
        progress: parseInt(document.getElementById('progress-value').value),
        mood: parseInt(document.getElementById('mood-value').value),
        energy: parseInt(document.getElementById('energy-value').value)
    };
    
    fetch(`${API_URL}/commitments/${commitmentId}/checkins`, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify(data)
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Failed to save checkin');
        }
        return response.json();
    })
    .then(checkin => {
        // Close modal and reset form
        $('#checkin-modal').modal('hide');
        document.getElementById('checkin-form').reset();
        
        // Reload commitments to show new checkin
        loadTodayCommitments();
    })
    .catch(error => {
        console.error('Error saving checkin:', error);
        alert('Failed to save checkin. Please try again.');
    });
}

// Toggle checkins list
function toggleCheckinsList(commitmentId) {
    const list = document.getElementById(`checkins-${commitmentId}`);
    if (list.style.display === 'none') {
        loadCheckins(commitmentId);
        list.style.display = 'block';
    } else {
        list.style.display = 'none';
    }
}

// Load checkins for a commitment
function loadCheckins(commitmentId) {
    const token = getAuthToken();
    if (!token) {
        window.location.href = '/login';
        return;
    }
    
    const list = document.getElementById(`checkins-${commitmentId}`);
    list.innerHTML = '<div class="ui active inverted dimmer"><div class="ui text loader">Loading checkins...</div></div>';
    
    fetch(`${API_URL}/commitments/${commitmentId}/checkins`, {
        headers: {
            'Authorization': `Bearer ${token}`
        }
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Failed to load checkins');
        }
        return response.json();
    })
    .then(checkins => {
        displayCheckins(commitmentId, checkins);
    })
    .catch(error => {
        console.error('Error loading checkins:', error);
        list.innerHTML = '<div class="ui negative message">Failed to load checkins</div>';
    });
}

// Display checkins
function displayCheckins(commitmentId, checkins) {
    const list = document.getElementById(`checkins-${commitmentId}`);
    
    if (!checkins || checkins.length === 0) {
        list.innerHTML = '<div class="ui info message">No checkins yet.</div>';
        return;
    }
    
    let html = '<div class="ui list">';
    checkins.forEach(checkin => {
        const timestamp = new Date(checkin.timestamp);
        html += `
        <div class="item">
            <i class="clock icon"></i>
            <div class="content">
                <div class="header">
                    ${timestamp.toLocaleString()}
                    <span class="ui label">RPE: ${checkin.rpe}</span>
                    ${checkin.progress ? `<span class="ui label">Progress: ${checkin.progress}%</span>` : ''}
                    ${checkin.mood ? `<span class="ui label">Mood: ${checkin.mood}</span>` : ''}
                    ${checkin.energy ? `<span class="ui label">Energy: ${checkin.energy}</span>` : ''}
                </div>
                <div class="description">${checkin.comment || ''}</div>
            </div>
        </div>`;
    });
    html += '</div>';
    
    list.innerHTML = html;
}

// Update commitment completion status
function updateCommitmentCompletion(commitmentId, completed) {
    const token = getAuthToken();
    if (!token) {
        window.location.href = '/login';
        return;
    }
    
    fetch(`${API_URL}/commitments/${commitmentId}`, {
        method: 'PUT',
        headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${token}`
        },
        body: JSON.stringify({ completed: completed })
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Failed to update commitment');
        }
        
        // Update UI
        const commitmentItem = document.querySelector(`.item[data-id="${commitmentId}"]`);
        if (commitmentItem) {
            const header = commitmentItem.querySelector('.header');
            
            if (completed) {
                if (!header.querySelector('.ui.green.label')) {
                    header.innerHTML += ' <span class="ui green label">Completed</span>';
                }
            } else {
                const label = header.querySelector('.ui.green.label');
                if (label) {
                    label.remove();
                }
            }
        }
    })
    .catch(error => {
        console.error('Error updating commitment:', error);
        alert('Failed to update commitment. Please try again.');
        
        // Revert checkbox
        const checkbox = document.querySelector(`input[data-id="${commitmentId}"]`);
        if (checkbox) {
            checkbox.checked = !completed;
        }
    });
}
