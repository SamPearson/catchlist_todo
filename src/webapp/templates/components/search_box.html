{% macro search_box(id='search-box', placeholder='Search...', class='') -%}
<div class="ui segment {% if class %}{{ class }}{% endif %}" id="{{ id }}">
    <div class="ui fluid icon input">
        <input type="text" class="search-input" placeholder="{{ placeholder }}">
        <i class="search icon"></i>
    </div>
    
    <div class="ui segment filter-options" style="margin-top: 10px; display: none;">
        {{ caller() if caller else '' }}
    </div>
    
    <div class="ui basic button toggle-filters" style="margin-top: 10px;">
        <i class="filter icon"></i> Filters
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const searchBox = document.getElementById('{{ id }}');
    if (searchBox) {
        const filterOptions = searchBox.querySelector('.filter-options');
        const toggleButton = searchBox.querySelector('.toggle-filters');
        
        toggleButton.addEventListener('click', function() {
            $(filterOptions).slideToggle();
        });
        
        const searchInput = searchBox.querySelector('.search-input');
        searchInput.addEventListener('input', function() {
            // Emit a custom event when search input changes
            const event = new CustomEvent('searchChange', {
                detail: { query: this.value.trim() }
            });
            document.dispatchEvent(event);
        });
    }
});
</script>
{%- endmacro %}
