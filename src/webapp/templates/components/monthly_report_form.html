<!-- Monthly Report Form Component -->
<h3 class="ui header">Monthly Report</h3>
<div class="ui form">
    <div class="field">
        <label>Month Theme</label>
        <input type="text" id="month-theme">
    </div>
    <div class="field">
        <label>Goals</label>
        <textarea id="month-goals" rows="2"></textarea>
    </div>
    <div class="field">
        <label>Goals Rationale</label>
        <textarea id="month-goals-rationale" rows="2"></textarea>
    </div>
    <div class="field">
        <label>RPE (Rate of Perceived Exertion)</label>
        <input type="number" id="month-rpe" min="1" max="10">
    </div>
    <div class="field">
        <label>Gains</label>
        <textarea id="month-gains" rows="2"></textarea>
    </div>
    <div class="field">
        <label>Gratitudes</label>
        <textarea id="month-gratitudes" rows="2"></textarea>
    </div>
    <button class="ui primary button" id="save-monthly-report">Save Monthly Report</button>
</div>
