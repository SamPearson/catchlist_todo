<!-- Weekly Report Form Component -->
<h3 class="ui header">Weekly Report</h3>
<div class="ui form">
    <div class="field">
        <label>Weekly Aim</label>
        <textarea id="weekly-aim" rows="2"></textarea>
    </div>
    <div class="field">
        <label>Weekly Notes</label>
        <textarea id="weekly-notes" rows="2"></textarea>
    </div>
    <div class="field">
        <label>RPE (Rate of Perceived Exertion)</label>
        <input type="number" id="weekly-rpe" min="1" max="10">
    </div>
    <div class="field">
        <label>Gains</label>
        <textarea id="weekly-gains" rows="2"></textarea>
    </div>
    <div class="field">
        <label>Gratitudes</label>
        <textarea id="weekly-gratitudes" rows="2"></textarea>
    </div>
    <button class="ui primary button" id="save-weekly-report">Save Weekly Report</button>
</div>
