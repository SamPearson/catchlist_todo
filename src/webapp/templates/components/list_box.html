{% macro list_box(id='list-box', empty_message='No items to display', class='') -%}
<div class="ui segment {% if class %}{{ class }}{% endif %}" id="{{ id }}">
    <div class="ui divided items list-container">
        <!-- Items will be loaded dynamically -->
        <div class="empty-message" style="display: none;">
            <div class="ui message">{{ empty_message }}</div>
        </div>
        
        <div class="loading-placeholder">
            <div class="ui placeholder">
                <div class="header">
                    <div class="line"></div>
                </div>
                <div class="paragraph">
                    <div class="line"></div>
                    <div class="line"></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="ui pagination menu" style="margin-top: 15px; display: none;">
        <!-- Pagination will be added dynamically if needed -->
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const listBox = document.getElementById('{{ id }}');
    if (listBox) {
        // Export functions to allow controlling this list box
        window.listBoxes = window.listBoxes || {};
        window.listBoxes['{{ id }}'] = {
            showLoading: function() {
                listBox.querySelector('.loading-placeholder').style.display = 'block';
                listBox.querySelector('.empty-message').style.display = 'none';
            },
            
            hideLoading: function() {
                listBox.querySelector('.loading-placeholder').style.display = 'none';
            },
            
            setItems: function(items) {
                const container = listBox.querySelector('.list-container');
                const emptyMessage = listBox.querySelector('.empty-message');
                
                // Remove loading placeholder and any existing items
                this.hideLoading();
                container.querySelectorAll('.item:not(.empty-message)').forEach(item => {
                    item.remove();
                });
                
                // Show empty message if no items
                if (!items || items.length === 0) {
                    emptyMessage.style.display = 'block';
                    return;
                }
                
                // Hide empty message
                emptyMessage.style.display = 'none';
                
                // Add items to the list
                items.forEach(itemHTML => {
                    const itemElement = document.createElement('div');
                    itemElement.className = 'item';
                    itemElement.innerHTML = itemHTML;
                    container.appendChild(itemElement);
                });
            },
            
            setupPagination: function(currentPage, totalPages) {
                const paginationMenu = listBox.querySelector('.pagination.menu');
                
                if (totalPages <= 1) {
                    paginationMenu.style.display = 'none';
                    return;
                }
                
                paginationMenu.style.display = 'flex';
                paginationMenu.innerHTML = '';
                
                // Add previous page button
                const prevItem = document.createElement('a');
                prevItem.className = 'item' + (currentPage <= 1 ? ' disabled' : '');
                prevItem.innerHTML = '<i class="angle left icon"></i>';
                prevItem.dataset.page = currentPage - 1;
                paginationMenu.appendChild(prevItem);
                
                // Add page number buttons
                const startPage = Math.max(1, currentPage - 2);
                const endPage = Math.min(totalPages, startPage + 4);
                
                for (let i = startPage; i <= endPage; i++) {
                    const pageItem = document.createElement('a');
                    pageItem.className = 'item' + (i === currentPage ? ' active' : '');
                    pageItem.textContent = i;
                    pageItem.dataset.page = i;
                    paginationMenu.appendChild(pageItem);
                }
                
                // Add next page button
                const nextItem = document.createElement('a');
                nextItem.className = 'item' + (currentPage >= totalPages ? ' disabled' : '');
                nextItem.innerHTML = '<i class="angle right icon"></i>';
                nextItem.dataset.page = currentPage + 1;
                paginationMenu.appendChild(nextItem);
                
                // Add event listeners to pagination items
                paginationMenu.querySelectorAll('.item:not(.disabled)').forEach(item => {
                    item.addEventListener('click', function() {
                        const page = parseInt(this.dataset.page);
                        
                        // Emit a custom event for page change
                        const event = new CustomEvent('pageChange', {
                            detail: { page: page }
                        });
                        document.dispatchEvent(event);
                    });
                });
            }
        };
    }
});
</script>
{%- endmacro %}
