<!-- Yearly Report Form Component -->
<h3 class="ui header">Yearly Report</h3>
<div class="ui form">
    <div class="field">
        <label>Year Theme</label>
        <input type="text" id="year-theme">
    </div>
    <div class="field">
        <label>Goals</label>
        <textarea id="year-goals" rows="2"></textarea>
    </div>
    <div class="field">
        <label>Goals Rationale</label>
        <textarea id="year-goals-rationale" rows="2"></textarea>
    </div>
    <div class="field">
        <label>RPE (Rate of Perceived Exertion)</label>
        <input type="number" id="year-rpe" min="1" max="10">
    </div>
    <div class="field">
        <label>Gains</label>
        <textarea id="year-gains" rows="2"></textarea>
    </div>
    <div class="field">
        <label>Gratitudes</label>
        <textarea id="year-gratitudes" rows="2"></textarea>
    </div>
    <button class="ui primary button" id="save-yearly-report">Save Yearly Report</button>
</div>
