<!-- Tag Management Component -->
<div class="ui modal" id="tag-management-modal">
    <i class="close icon"></i>
    <div class="header">Manage Tags</div>
    <div class="content">
        <!-- Create New Tag Section -->
        <div class="ui segment">
            <h4 class="ui header">
                <i class="plus icon"></i>
                <div class="content">
                    Create New Tag
                    <div class="sub header">Add a new tag with a custom color</div>
                </div>
            </h4>
            <form id="create-tag-form" class="ui form">
                <div class="two fields">
                    <div class="field">
                        <label for="new-tag-name">Tag Name</label>
                        <input type="text" id="new-tag-name" placeholder="Enter tag name" required>
                    </div>
                    <div class="field">
                        <label for="new-tag-color">Tag Color</label>
                        <div class="ui input">
                            <input type="color" id="new-tag-color" value="#6c757d" style="height: 38px; padding: 0 5px;">
                        </div>
                    </div>
                </div>
                <button type="submit" class="ui primary button">
                    <i class="plus icon"></i>
                    Create Tag
                </button>
            </form>
        </div>

        <!-- Current Tags Section -->
        <div class="ui segment">
            <h4 class="ui header">
                <i class="tags icon"></i>
                <div class="content">
                    Current Tags
                    <div class="sub header">Tags currently applied to this item</div>
                </div>
            </h4>
            <div id="current-tags-list" class="ui labels">
                <!-- Current tags will be loaded here -->
            </div>
        </div>
        
        <!-- Available Tags Section -->
        <div class="ui segment">
            <h4 class="ui header">
                <i class="list icon"></i>
                <div class="content">
                    Available Tags
                    <div class="sub header">Tags you can apply to this item</div>
                </div>
            </h4>
            <div id="available-tags-list" class="ui labels">
                <!-- Available tags will be loaded here -->
            </div>
        </div>
    </div>
    <div class="actions">
        <div class="ui button cancel">Close</div>
    </div>
</div>

<!-- Quick Tag Management Component -->
<div class="ui popup" id="quick-tag-management">
    <div class="ui segment">
        <div class="ui form">
            <div class="field">
                <label>Quick Add Tag</label>
                <div class="ui action input">
                    <input type="text" id="quick-tag-name" placeholder="Enter tag name">
                    <button class="ui teal button" id="quick-create-tag">
                        <i class="plus icon"></i>
                    </button>
                </div>
            </div>
        </div>
        <div class="ui divider"></div>
        <div id="quick-tags-list" class="ui labels">
            <!-- Available tags will be loaded here -->
        </div>
        <div class="ui divider"></div>
        <button class="ui fluid button" id="open-full-tag-manager">
            <i class="tags icon"></i>
            Open Full Tag Manager
        </button>
    </div>
</div>

<style>
/* Tag Management Modal Styles */
#tag-management-modal .ui.labels {
    margin: 1em 0;
}

#tag-management-modal .ui.label {
    margin: 0.25em;
    cursor: pointer;
}

#tag-management-modal .ui.label:hover {
    opacity: 0.8;
}

#tag-management-modal .ui.label .delete.icon {
    margin-left: 0.5em;
    opacity: 0.7;
}

#tag-management-modal .ui.label .delete.icon:hover {
    opacity: 1;
}

#tag-management-modal .ui.segment {
    margin: 1em 0;
}

#tag-management-modal .ui.header {
    margin-bottom: 1em;
}

/* Quick Tag Management Styles */
#quick-tag-management {
    min-width: 250px;
    max-width: 300px;
}

#quick-tag-management .ui.labels {
    margin: 0.5em 0;
}

#quick-tag-management .ui.label {
    margin: 0.25em;
    cursor: pointer;
}

#quick-tag-management .ui.label:hover {
    opacity: 0.8;
}

#quick-tag-management .ui.divider {
    margin: 0.5em 0;
}

#quick-tag-management .ui.button {
    margin-top: 0.5em;
}

/* Common Tag Styles */
.ui.label {
    transition: opacity 0.2s ease;
}

.ui.label:hover {
    opacity: 0.8;
}

.ui.label .delete.icon {
    margin-left: 0.5em;
    opacity: 0.7;
}

.ui.label .delete.icon:hover {
    opacity: 1;
}
</style>

<script>
// Tag Management Functions
function showTagManagementModal(itemId, itemType) {
    const headers = getAuthHeaders();
    if (!headers) {
        window.location.href = '/login';
        return;
    }
    
    // Store the current item info in the modal
    const modal = document.getElementById('tag-management-modal');
    modal.dataset.itemId = itemId;
    modal.dataset.itemType = itemType;
    
    // Load current tags
    loadCurrentTags(itemId, itemType);
    loadAvailableTags(itemId, itemType);
    
    // Show the modal
    $('#tag-management-modal').modal('show');
}

function showQuickTagManagement(element, itemId, itemType) {
    const headers = getAuthHeaders();
    if (!headers) {
        window.location.href = '/login';
        return;
    }
    
    if (!itemId || !itemType) {
        console.error('Missing item ID or type for tag management');
        return;
    }
    
    // Store the current item info
    const popup = document.getElementById('quick-tag-management');
    popup.dataset.itemId = itemId;
    popup.dataset.itemType = itemType;
    
    // Load available tags
    loadQuickTags(itemId, itemType);
    
    // Destroy any existing popup on this element
    $(element).popup('destroy');
    
    // Show popup
    $(element).popup({
        popup: '#quick-tag-management',
        position: 'bottom center',
        on: 'click',
        onShow: function() {
            // Focus the input
            document.getElementById('quick-tag-name').focus();
        }
    }).popup('show');
}

function loadCurrentTags(itemId, itemType) {
    const headers = getAuthHeaders();
    if (!headers) {
        window.location.href = '/login';
        return;
    }
    
    const container = document.getElementById('current-tags-list');
    container.innerHTML = '<div class="ui active inverted dimmer"><div class="ui text loader">Loading tags...</div></div>';
    
    fetch(`${API_URL}/tags/entity/${itemType}/${itemId}`, {
        headers: headers
    })
    .then(response => response.json())
    .then(tags => {
        container.innerHTML = '';
        if (tags.length === 0) {
            container.innerHTML = '<div class="ui text">No tags applied</div>';
            return;
        }
        
        tags.forEach(tag => {
            const tagElement = document.createElement('div');
            tagElement.className = 'ui label';
            tagElement.style.backgroundColor = tag.color;
            tagElement.style.color = getContrastColor(tag.color);
            
            // Create the delete icon separately
            const deleteIcon = document.createElement('i');
            deleteIcon.className = 'delete icon';
            deleteIcon.dataset.tagId = tag.id;
            
            // Add click handler for delete icon
            deleteIcon.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                removeTag(itemId, itemType, tag.id);
            });
            
            // Add the tag name and delete icon
            tagElement.appendChild(document.createTextNode(tag.name));
            tagElement.appendChild(deleteIcon);
            
            container.appendChild(tagElement);
        });
    })
    .catch(error => {
        console.error('Error loading current tags:', error);
        container.innerHTML = '<div class="ui negative message">Failed to load tags</div>';
    });
}

function loadAvailableTags(itemId, itemType) {
    const headers = getAuthHeaders();
    if (!headers) {
        window.location.href = '/login';
        return;
    }
    
    const container = document.getElementById('available-tags-list');
    container.innerHTML = '<div class="ui active inverted dimmer"><div class="ui text loader">Loading available tags...</div></div>';
    
    // First get current tags to filter them out
    fetch(`${API_URL}/tags/entity/${itemType}/${itemId}`, {
        headers: headers
    })
    .then(response => response.json())
    .then(currentTags => {
        const currentTagIds = new Set(currentTags.map(tag => tag.id));
        
        // Then get all tags
        return fetch(`${API_URL}/tags`, {
            headers: headers
        })
        .then(response => response.json())
        .then(allTags => {
            // Filter out tags that are already applied
            const availableTags = allTags.filter(tag => !currentTagIds.has(tag.id));
            
            container.innerHTML = '';
            if (availableTags.length === 0) {
                container.innerHTML = '<div class="ui text">No more tags available</div>';
                return;
            }
            
            availableTags.forEach(tag => {
                const tagElement = document.createElement('div');
                tagElement.className = 'ui label';
                tagElement.style.backgroundColor = tag.color;
                tagElement.style.color = getContrastColor(tag.color);
                tagElement.textContent = tag.name;
                
                // Add click handler to apply tag
                tagElement.addEventListener('click', function() {
                    applyTag(itemId, itemType, tag.id);
                });
                
                container.appendChild(tagElement);
            });
        });
    })
    .catch(error => {
        console.error('Error loading available tags:', error);
        container.innerHTML = '<div class="ui negative message">Failed to load available tags</div>';
    });
}

function loadQuickTags(itemId, itemType) {
    const headers = getAuthHeaders();
    if (!headers) {
        window.location.href = '/login';
        return;
    }
    
    const container = document.getElementById('quick-tags-list');
    container.innerHTML = '<div class="ui active inverted dimmer"><div class="ui text loader">Loading tags...</div></div>';
    
    fetch(`${API_URL}/tags`, {
        headers: headers
    })
    .then(response => response.json())
    .then(tags => {
        container.innerHTML = '';
        if (tags.length === 0) {
            container.innerHTML = '<div class="ui text">No tags available</div>';
            return;
        }
        
        tags.forEach(tag => {
            const tagElement = document.createElement('div');
            tagElement.className = 'ui label';
            tagElement.style.backgroundColor = tag.color;
            tagElement.style.color = getContrastColor(tag.color);
            tagElement.textContent = tag.name;
            
            // Add click handler to apply tag
            tagElement.addEventListener('click', function() {
                applyTag(itemId, itemType, tag.id);
                // Close the popup after applying tag
                $('#quick-tag-management').popup('hide');
            });
            
            container.appendChild(tagElement);
        });
    })
    .catch(error => {
        console.error('Error loading quick tags:', error);
        container.innerHTML = '<div class="ui negative message">Failed to load tags</div>';
    });
}

function applyTag(itemId, itemType, tagId) {
    const headers = getAuthHeaders();
    if (!headers) {
        window.location.href = '/login';
        return;
    }
    
    fetch(`${API_URL}/tags/apply/${itemType}/${itemId}/${tagId}`, {
        method: 'POST',
        headers: headers
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Failed to apply tag');
        }
        return response.json();
    })
    .then(() => {
        // Reload tags
        loadCurrentTags(itemId, itemType);
        loadAvailableTags(itemId, itemType);
        
        // If this is a project, update the project header without reloading
        if (itemType === 'project') {
            const projectElement = document.querySelector(`.ui.segment[data-id="${itemId}"]`);
            if (projectElement) {
                const tagsContainer = projectElement.querySelector('.item:nth-child(5) .ui.labels');
                if (tagsContainer) {
                    // Get the updated tags
                    fetch(`${API_URL}/tags/entity/${itemType}/${itemId}`, {
                        headers: headers
                    })
                    .then(response => response.json())
                    .then(tags => {
                        if (tags.length === 0) {
                            tagsContainer.innerHTML = '<span class="ui text">No tags</span>';
                        } else {
                            tagsContainer.innerHTML = tags.map(tag => `
                                <div class="ui label" style="background-color: ${tag.color}; color: white;">
                                    ${tag.name}
                                </div>
                            `).join('');
                        }
                    });
                }
            }
        }
    })
    .catch(error => {
        console.error('Error applying tag:', error);
        showError('Failed to apply tag');
    });
}

function removeTag(itemId, itemType, tagId) {
    const headers = getAuthHeaders();
    if (!headers) {
        window.location.href = '/login';
        return;
    }
    
    fetch(`${API_URL}/tags/remove/${itemType}/${itemId}/${tagId}`, {
        method: 'DELETE',
        headers: headers
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Failed to remove tag');
        }
        return response.json();
    })
    .then(() => {
        // Reload tags
        loadCurrentTags(itemId, itemType);
        loadAvailableTags(itemId, itemType);
        
        // If this is a project, update the project header without reloading
        if (itemType === 'project') {
            const projectElement = document.querySelector(`.ui.segment[data-id="${itemId}"]`);
            if (projectElement) {
                const tagsContainer = projectElement.querySelector('.item:nth-child(5) .ui.labels');
                if (tagsContainer) {
                    // Get the updated tags
                    fetch(`${API_URL}/tags/entity/${itemType}/${itemId}`, {
                        headers: headers
                    })
                    .then(response => response.json())
                    .then(tags => {
                        if (tags.length === 0) {
                            tagsContainer.innerHTML = '<span class="ui text">No tags</span>';
                        } else {
                            tagsContainer.innerHTML = tags.map(tag => `
                                <div class="ui label" style="background-color: ${tag.color}; color: white;">
                                    ${tag.name}
                                </div>
                            `).join('');
                        }
                    });
                }
            }
        }
    })
    .catch(error => {
        console.error('Error removing tag:', error);
        showError('Failed to remove tag');
    });
}

// Add event listener for creating new tags
document.getElementById('create-tag-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const headers = getAuthHeaders();
    if (!headers) {
        window.location.href = '/login';
        return;
    }
    
    const name = document.getElementById('new-tag-name').value.trim();
    const color = document.getElementById('new-tag-color').value;
    
    if (!name) {
        showError('Please enter a tag name');
        return;
    }
    
    fetch(`${API_URL}/tags`, {
        method: 'POST',
        headers: {
            ...headers,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            name: name,
            color: color
        })
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Failed to create tag');
        }
        return response.json();
    })
    .then(tag => {
        // Clear the form
        this.reset();
        
        // Only reload available tags if we have a valid itemId and itemType
        const modal = document.getElementById('tag-management-modal');
        const itemId = modal.dataset.itemId;
        const itemType = modal.dataset.itemType;
        
        if (itemId && itemType) {
            loadAvailableTags(itemId, itemType);
        }
        
        showSuccess('Tag created successfully');
    })
    .catch(error => {
        console.error('Error creating tag:', error);
        showError('Failed to create tag');
    });
});

// Add event listener for quick tag creation
document.getElementById('quick-create-tag').addEventListener('click', function() {
    const headers = getAuthHeaders();
    if (!headers) {
        window.location.href = '/login';
        return;
    }
    
    const name = document.getElementById('quick-tag-name').value.trim();
    if (!name) {
        showError('Please enter a tag name');
        return;
    }
    
    fetch(`${API_URL}/tags`, {
        method: 'POST',
        headers: {
            ...headers,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            name: name,
            color: getRandomColor()
        })
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Failed to create tag');
        }
        return response.json();
    })
    .then(tag => {
        // Clear the input
        document.getElementById('quick-tag-name').value = '';
        
        // Only reload quick tags if we have a valid itemId and itemType
        const popup = document.getElementById('quick-tag-management');
        const itemId = popup.dataset.itemId;
        const itemType = popup.dataset.itemType;
        
        if (itemId && itemType) {
            loadQuickTags(itemId, itemType);
        }
        
        showSuccess('Tag created successfully');
    })
    .catch(error => {
        console.error('Error creating tag:', error);
        showError('Failed to create tag');
    });
});

// Add event listener for opening full tag manager
document.getElementById('open-full-tag-manager').addEventListener('click', function() {
    const popup = document.getElementById('quick-tag-management');
    const itemId = popup.dataset.itemId;
    const itemType = popup.dataset.itemType;
    
    // Hide the popup
    $('#quick-tag-management').popup('hide');
    
    // Show the full modal
    showTagManagementModal(itemId, itemType);
});

// Helper function to get a random color
function getRandomColor() {
    const letters = '0123456789ABCDEF';
    let color = '#';
    for (let i = 0; i < 6; i++) {
        color += letters[Math.floor(Math.random() * 16)];
    }
    return color;
}

// Helper function to get contrasting text color
function getContrastColor(hexcolor) {
    // Remove the # if present
    hexcolor = hexcolor.replace('#', '');
    
    // Convert to RGB
    const r = parseInt(hexcolor.substr(0, 2), 16);
    const g = parseInt(hexcolor.substr(2, 2), 16);
    const b = parseInt(hexcolor.substr(4, 2), 16);
    
    // Calculate luminance
    const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
    
    // Return black or white based on luminance
    return luminance > 0.5 ? '#000000' : '#FFFFFF';
}

// Helper function to show error message
function showError(message) {
    const errorDiv = document.createElement('div');
    errorDiv.className = 'ui negative message';
    errorDiv.innerHTML = message;
    
    // Add to the modal content
    const modalContent = document.querySelector('#tag-management-modal .content');
    modalContent.insertBefore(errorDiv, modalContent.firstChild);
    
    // Remove after 3 seconds
    setTimeout(() => {
        errorDiv.remove();
    }, 3000);
}

// Helper function to show success message
function showSuccess(message) {
    const successDiv = document.createElement('div');
    successDiv.className = 'ui positive message';
    successDiv.innerHTML = message;
    
    // Add to the modal content
    const modalContent = document.querySelector('#tag-management-modal .content');
    modalContent.insertBefore(successDiv, modalContent.firstChild);
    
    // Remove after 3 seconds
    setTimeout(() => {
        successDiv.remove();
    }, 3000);
}
</script>
