<!-- Daily Report Form Component -->
<div class="ui segment">
    <h3 class="ui header">Daily Report</h3>
    <div class="ui form">
        <div class="two fields">
            <div class="field">
                <label>Sleep (hours)</label>
                <input type="number" id="sleep-hours" min="0" max="24" step="0.5">
            </div>
            <div class="field">
                <label>Mood (1-10)</label>
                <input type="number" id="mood-score" min="1" max="10">
            </div>
        </div>
        <div class="field">
            <label>Food</label>
            <textarea id="food-notes" rows="2"></textarea>
        </div>
        <div class="field">
            <label>RPE (Rate of Perceived Exertion)</label>
            <input type="number" id="rpe-score" min="1" max="10">
        </div>
        <div class="field">
            <label>Gains</label>
            <textarea id="gains-notes" rows="2"></textarea>
        </div>
        <div class="field">
            <label>Gratitudes</label>
            <textarea id="gratitudes-notes" rows="2"></textarea>
        </div>
        <button class="ui primary button" id="save-daily-report">Save Daily Report</button>
    </div>
</div>
