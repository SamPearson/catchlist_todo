{# Single Session Display Component - View and edit a session #}

{% macro session_display(session) %}
<div x-data='sessionDisplay({{ session | tojson }})' class="{{ 'mb-6' if variant == 'standalone' else '' }}" data-testid="session-item-{{ session.id }}">
    <!-- View Mode: Display the session -->
    <template x-if="mode === 'view'">
        <div class="{{ 'box' if variant == 'standalone' else '' }}">
            <!-- Minimized State -->
            <div x-show="!expanded"
                 @click="toggleExpand()"
                 class="is-flex is-justify-content-space-between is-align-items-center has-text-weight-bold has-text-black {{ 'box mb-3' if variant == 'standalone' else 'px-4 py-3' }}"
                 data-testid="session-item-{{ session.id }}-minimized"
                 style="cursor: pointer; {{ 'border: 1px solid #ddd; border-radius: 6px;' if variant == 'standalone' else 'border-bottom: 1px solid #dbdbdb;' }} position: relative;">
                <div class="is-flex is-align-items-center" style="flex: 1;">
                    <h3 class="title is-5 mb-0" x-text="session.title"></h3>
                    <span class="has-text-grey" x-show="session.routine_name">
                        &mdash; <span x-text="session.routine_name"></span>
                    </span>
                </div>
                <div class="is-flex is-align-items-center">
                    <span x-text="formatDate(session.start_time)"></span>
                    <span> | </span>
                    <span x-text="formatTime(session.start_time)"></span>
                    <span> → </span>
                    <span x-text="formatTime(session.end_time)"></span>
                </div>

                <!-- Centered Status Badge -->
                <div style="position: absolute; left: 50%; transform: translateX(-50%); top: 50%; transform: translateY(-50%);">
                    <span class="tag is-medium" :class="statusTagClass">
                        <span x-text="session.status"></span>
                    </span>
                </div>
            </div>
            <!-- Expanded State -->
            <div x-show="expanded" class="{{ 'box mb-3' if variant == 'standalone' else 'px-4 py-3' }}" data-testid="session-item-{{ session.id }}-expanded"
                 style="{{ '' if variant == 'standalone' else 'border-bottom: 1px solid #dbdbdb;' }}">
                <div class="is-flex is-justify-content-space-between is-align-items-center mb-3">
                    <div class="is-flex is-align-items-center is-flex-wrap-wrap" style="gap: 0.5rem;">
                        <h3 class="title is-5 mb-0" x-text="session.title"></h3>
                        <span class="has-text-grey" x-show="session.routine_name">
                            &mdash; <span x-text="session.routine_name"></span>
                        </span>
                        <span class="tag is-medium" :class="statusTagClass">
                            <span x-text="session.status"></span>
                        </span>
                        <span x-text="formatDate(session.start_time)"></span>
                        <span> | </span>
                        <span x-text="formatTime(session.start_time)"></span>
                        <span> → </span>
                        <span x-text="formatTime(session.end_time)"></span>
                    </div>
                    <button @click="toggleEdit()" class="button is-small is-info" data-testid="session-item-{{ session.id }}-edit-button">
                        <span class="icon is-small">
                            <i class="fas fa-edit"></i>
                        </span>
                        <span>Edit</span>
                    </button>
                </div>

                <!-- Tags and Principles (placeholder) -->
                <div class="is-flex is-flex-wrap-wrap mb-3">
                    <div class="mr-2 mb-2">
                        <strong>Tags:</strong>
                        <div class="mt-1">
                            <template x-for="tag in session.tags">
                                <span class="tag is-light mr-1" x-text="tag"></span>
                            </template>
                        </div>
                    </div>
                    <div>
                        <strong>Principles:</strong>
                        <div class="mt-1">
                            <template x-for="principle in session.principles">
                                <span class="tag is-light mr-1" x-text="principle"></span>
                            </template>
                        </div>
                    </div>
                    <div class="is-flex is-align-items-center ml-auto">
                        <span class="mr-2">RPE:</span>
                        <span x-text="session.rpe"></span>
                    </div>
                </div>

                <div class="mb-3">
                    <strong>Notes:</strong>
                    <p class="ml-1" x-text="session.notes || 'No notes'"></p>
                </div>

                <!-- Checkins Section -->
                <div class="mb-3">
                    <div class="is-flex is-align-items-center" style="gap: 0.75rem;">
                        <strong>Checkins</strong>
                        <span class="tag is-light" x-text="checkins.length"></span>
                        <button @click="toggleCheckins()" class="button is-small is-ghost p-0 has-text-link">
                            <span x-text="checkinsExpanded ? '▲ Hide' : '▼ Show'"></span>
                        </button>
                    </div>

                    <div x-show="checkinsExpanded" class="mt-3">
                        <template x-if="checkins.length === 0">
                            <p class="has-text-grey">No checkins yet.</p>
                        </template>

                        <template x-for="(checkin, index) in checkins" :key="index">
                            <div class="is-flex is-justify-content-space-between is-align-items-start p-3 mb-2"
                                 style="border: 1px solid #dbdbdb; border-radius: 6px; background: #fafafa;">
                                <div>
                                    <p class="has-text-weight-semibold is-size-7" x-text="formatDateTime(checkin.timestamp)"></p>
                                    <p class="mt-1" x-text="checkin.notes || 'No notes'"></p>
                                </div>
                                <button @click="removeCheckin(index)"
                                        class="delete"
                                        title="Remove checkin">
                                </button>
                            </div>
                        </template>

                        <!-- Add Checkin -->
                        <div class="mt-3" x-show="!showAddCheckin">
                            <button @click="showAddCheckin = true" class="button is-small is-link is-light">
                                + Add Checkin
                            </button>
                        </div>
                        <div x-show="showAddCheckin" class="mt-3 p-3" style="border: 1px solid #dbdbdb; border-radius: 6px;">
                            <form @submit.prevent="addCheckin()">
                                <div class="field">
                                    <label class="label is-small">Notes</label>
                                    <div class="control">
                                        <textarea x-model="newCheckin.notes" class="textarea is-small" rows="2" placeholder="Optional notes..."></textarea>
                                    </div>
                                </div>
                                <div class="field is-grouped">                                    <div class="control">
                                        <button type="submit" class="button is-small is-success">Save</button>
                                    </div>
                                    <div class="control">
                                        <button type="button" @click="showAddCheckin = false; newCheckin = { timestamp: '', notes: '' }" class="button is-small is-light">Cancel</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>


                <!-- Metadata Section -->
                <div class="is-flex is-justify-content-space-between">
                    <span>Created: <span x-text="formatDateTime(session.created_at)"></span></span>
                    <span>Updated: <span x-text="formatDateTime(session.updated_at)"></span></span>
                </div>


            </div>
    </template>

    <!-- Edit Mode: Form to update session -->
    <template x-if="mode === 'edit'">
        <div class="box">
            <form @submit.prevent="submitForm">
                <!-- Title -->
                <div class="field">
                    <label class="label">Title</label>
                    <div class="control">
                        <input type="text" x-model="formData.title" class="input" required>
                    </div>
                    <p class="help is-danger" x-show="errors.title" x-text="errors.title"></p>
                </div>

                <!-- Start Time -->
                <div class="field">
                    <label class="label">Start Time</label>
                    <div class="control">
                        <input type="datetime-local" x-model="formData.start_time" class="input" required>
                    </div>
                    <p class="help is-danger" x-show="errors.start_time" x-text="errors.start_time"></p>
                </div>

                <!-- End Time -->
                <div class="field">
                    <label class="label">End Time</label>
                    <div class="control">
                        <input type="datetime-local" x-model="formData.end_time" class="input" required>
                    </div>
                    <p class="help is-danger" x-show="errors.end_time" x-text="errors.end_time"></p>
                </div>

                <!-- Status -->
                <div class="field">
                    <label class="label">Status</label>
                    <div class="control">
                        <select x-model="formData.status" class="input">
                            <option value="scheduled">Scheduled</option>
                            <option value="completed">Completed</option>
                            <option value="skipped">Skipped</option>
                            <option value="cancelled">Cancelled</option>
                        </select>
                    </div>
                </div>

                <!-- Notes -->
                <div class="field">
                    <label class="label">Notes</label>
                    <div class="control">
                        <textarea x-model="formData.notes" class="textarea" rows="3"></textarea>
                    </div>
                </div>

                <!-- RPE -->
                <div class="field">
                    <label class="label">RPE (1-10)</label>
                    <div class="control">
                        <input type="range" x-model="formData.rpe" min="1" max="10" class="input">
                        <span class="ml-2" x-text="formData.rpe"></span>
                    </div>
                </div>

                <!-- Routine Name (read-only) -->
                <div class="field">
                    <label class="label">Routine</label>
                    <div class="control">
                        <input type="text" :value="formData.routine_name" class="input" readonly>
                    </div>
                </div>

                <!-- Submit and Cancel Buttons -->
                <div class="field is-grouped mt-4">
                    <div class="control">
                        <button type="submit" class="button is-success">Save</button>
                    </div>
                    <div class="control">
                        <button type="button" @click="toggleEdit()" class="button is-light">Cancel</button>
                    </div>
                </div>
            </form>
        </div>
    </template>

    <!-- Delete Confirmation Modal -->
    <div x-cloak x-show="showDeleteModal" class="modal is-active">
        <div class="modal-background"></div>
        <div class="modal-card">
            <header class="modal-card-head">
                <p class="modal-card-title">Confirm Delete</p>
            </header>
            <section class="modal-card-body">
                <p>Are you sure you want to delete this session?</p>
            </section>
            <footer class="modal-card-foot">
                <button class="button is-danger" @click="deleteSession">Delete</button>
                <button class="button is-light" @click="showDeleteModal = false">Cancel</button>
            </footer>
        </div>
    </div>
</div>
{% endmacro %}
