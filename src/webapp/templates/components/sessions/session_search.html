{# Session Search Component - Filter and search sessions #}

{% macro session_search() %}
<div class="box">
    <div class="is-flex is-justify-content-space-between is-align-items-center mb-4">
        <h2 class="title is-4 mb-0">Search Sessions</h2>
        <button @click="expanded ? collapse() : expand()" class="button is-small" :class="expanded ? 'is-info' : 'is-light'">
            <span x-text="expanded ? '▲ Collapse' : '▼ Expand'"></span>
        </button>
    </div>

    <div x-show="expanded" class="mt-4">
        <!-- Date Range -->
        <div class="columns">
            <div class="column">
                <div class="field">
                    <label class="label">Start Date</label>
                    <div class="control">
                        <input type="datetime-local" x-model="dateRange.start" class="input">
                    </div>
                </div>
            </div>
            <div class="column">
                <div class="field">
                    <label class="label">End Date</label>
                    <div class="control">
                        <input type="datetime-local" x-model="dateRange.end" class="input">
                    </div>
                </div>
            </div>
        </div>

        <!-- Status Filter -->
        <div class="field">
            <label class="label">Status</label>
            <div class="control">
                <label class="checkbox mr-3">
                    <input type="checkbox" x-model="filters.status.scheduled">
                    Scheduled
                </label>
                <label class="checkbox mr-3">
                    <input type="checkbox" x-model="filters.status.completed">
                    Completed
                </label>
                <label class="checkbox mr-3">
                    <input type="checkbox" x-model="filters.status.skipped">
                    Skipped
                </label>
                <label class="checkbox">
                    <input type="checkbox" x-model="filters.status.cancelled">
                    Cancelled
                </label>
            </div>
        </div>

        <!-- Tags Filter -->
        <div class="field">
            <label class="label">Tags</label>
            <div class="control mb-2">
                <div class="is-flex" style="gap: 0.5rem;">
                    <input type="text" x-model="filters.tagInput" class="input" placeholder="Add tag...">
                    <button @click="addTag()" class="button is-info">Add</button>
                </div>
            </div>
            <div class="is-flex is-flex-wrap-wrap" style="gap: 0.5rem;">
                <template x-for="(tag, index) in filters.tags" :key="index">
                    <div class="is-flex is-align-items-center" style="gap: 0.5rem;">
                        <span class="tag" x-text="tag"></span>
                        <button @click="removeTag(index)" class="delete is-small"></button>
                    </div>
                </template>
            </div>
        </div>

        <!-- Principles Filter -->
        <div class="field">
            <label class="label">Principles</label>
            <div class="control mb-2">
                <div class="is-flex" style="gap: 0.5rem;">
                    <input type="text" x-model="filters.principleInput" class="input" placeholder="Add principle...">
                    <button @click="addPrinciple()" class="button is-info">Add</button>
                </div>
            </div>
            <div class="is-flex is-flex-wrap-wrap" style="gap: 0.5rem;">
                <template x-for="(principle, index) in filters.principles" :key="index">
                    <div class="is-flex is-align-items-center" style="gap: 0.5rem;">
                        <span class="tag" x-text="principle"></span>
                        <button @click="removePrinciple(index)" class="delete is-small"></button>
                    </div>
                </template>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="field is-grouped mt-4">
            <div class="control">
                <button @click="search()" class="button is-success" :disabled="loading">
                    <span x-show="!loading">Search</span>
                    <span x-show="loading">Searching...</span>
                </button>
            </div>
            <div class="control">
                <button @click="clearFilters()" class="button is-light" x-show="hasActiveFilters()">
                    Clear Filters
                </button>
            </div>
            <div class="control" x-show="hasActiveFilters()">
                <span class="tag is-info" x-text="`${getActiveFilterCount()} filter${getActiveFilterCount() !== 1 ? 's' : ''} active`"></span>
            </div>
        </div>
    </div>
</div>
{% endmacro %}
