{% macro report_selector() %}
<div x-data="reportSelector()" class="box">

    {# --- Type Tab Bar --- #}
    <div class="tabs is-boxed is-fullwidth mb-4">
        <ul>
            <template x-for="type in reportTypes" :key="type">
                <li :class="{ 'is-active': reportType === type }">
                    <a @click="reportType = type" x-text="type.charAt(0).toUpperCase() + type.slice(1)"></a>
                </li>
            </template>
        </ul>
    </div>

    {# --- Contextual Date Picker --- #}
    <div class="field is-grouped is-align-items-flex-end">

        {# Day #}
        <template x-if="reportType === 'day'">
            <div class="control is-expanded">
                <label class="label">Date</label>
                <input class="input" type="date" x-model="day.date">
            </div>
        </template>

        {# Week #}
        <template x-if="reportType === 'week'">
            <div class="control is-expanded">
                <label class="label">Any date within the week</label>
                <input class="input" type="date" x-model="week.date">
            </div>
        </template>

        {# Month #}
        <template x-if="reportType === 'month'">
            <div class="field is-grouped mb-0">
                <div class="control">
                    <label class="label">Month</label>
                    <div class="select">
                        <select x-model.number="month.month">
                            <option value="1">January</option>
                            <option value="2">February</option>
                            <option value="3">March</option>
                            <option value="4">April</option>
                            <option value="5">May</option>
                            <option value="6">June</option>
                            <option value="7">July</option>
                            <option value="8">August</option>
                            <option value="9">September</option>
                            <option value="10">October</option>
                            <option value="11">November</option>
                            <option value="12">December</option>
                        </select>
                    </div>
                </div>
                <div class="control">
                    <label class="label">Year</label>
                    <input class="input" type="number" x-model.number="month.year" style="width: 6rem;">
                </div>
            </div>
        </template>

        {# Season #}
        <template x-if="reportType === 'season'">
            <div class="field is-grouped mb-0">
                <div class="control">
                    <label class="label">Season</label>
                    <div class="select">
                        <select x-model="season.season">
                            <option value="winter">Winter</option>
                            <option value="spring">Spring</option>
                            <option value="summer">Summer</option>
                            <option value="fall">Fall</option>
                        </select>
                    </div>
                </div>
                <div class="control">
                    <label class="label">Year</label>
                    <input class="input" type="number" x-model.number="season.year" style="width: 6rem;">
                </div>
            </div>
        </template>

        {# Year #}
        <template x-if="reportType === 'year'">
            <div class="control">
                <label class="label">Year</label>
                <input class="input" type="number" x-model.number="year.year" style="width: 6rem;">
            </div>
        </template>

    </div>

    {# --- Selection Summary + Navigation + Load --- #}
    <div class="is-flex is-align-items-center mt-4" style="gap: 0.75rem;">
        <button class="button" @click="prev()" title="Previous">
            <span class="icon"><i class="arrow-left">◀</i></span>
        </button>
        <span class="has-text-weight-semibold is-flex-grow-1 has-text-centered" x-text="selectionLabel"></span>
        <button class="button" @click="next()" title="Next">
            <span class="icon"><i class="arrow-right">▶</i></span>
        </button>
        <button class="button is-primary" @click="loadReport()">
            Load Report
        </button>
    </div>

</div>
{% endmacro %}
