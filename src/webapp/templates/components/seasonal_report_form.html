<!-- Seasonal Report Form Component -->
<h3 class="ui header">Seasonal Report</h3>
<div class="ui form">
    <div class="field">
        <label>Season Theme</label>
        <input type="text" id="season-theme">
    </div>
    <div class="field">
        <label>Goals</label>
        <textarea id="season-goals" rows="2"></textarea>
    </div>
    <div class="field">
        <label>Goals Rationale</label>
        <textarea id="season-goals-rationale" rows="2"></textarea>
    </div>
    <div class="field">
        <label>RPE (Rate of Perceived Exertion)</label>
        <input type="number" id="season-rpe" min="1" max="10">
    </div>
    <div class="field">
        <label>Gains</label>
        <textarea id="season-gains" rows="2"></textarea>
    </div>
    <div class="field">
        <label>Gratitudes</label>
        <textarea id="season-gratitudes" rows="2"></textarea>
    </div>
    <button class="ui primary button" id="save-seasonal-report">Save Seasonal Report</button>
</div>
