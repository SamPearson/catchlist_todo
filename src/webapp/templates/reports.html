{% extends "base.html" %}

{% block title %}Reports{% endblock %}

{% block content %}
<div class="ui container">
    <h1 class="ui header">Reports</h1>
    
    <!-- Report Type Tabs -->
    <div class="ui secondary pointing menu">
        <a class="item active" data-tab="day">Day</a>
        <a class="item" data-tab="week">Week</a>
        <a class="item" data-tab="month">Month</a>
        <a class="item" data-tab="season">Season</a>
        <a class="item" data-tab="year">Year</a>
        <a class="item" data-tab="custom">Custom</a>
        {% if config.SHOW_DEMO %}
        <a class="item" data-tab="demo">Demo</a>
        {% endif %}
    </div>
    
    <!-- Report Content -->
    <div class="ui tab active" data-tab="day">
        <div class="ui segment">
            <div class="ui form">
                <div class="field">
                    <label>Select Date</label>
                    <input type="date" id="day-date" class="ui input">
                </div>
            </div>
            <div id="day-report" class="ui segment">
                <!-- Day report content will be loaded here -->
            </div>
        </div>
    </div>
    
    <div class="ui tab" data-tab="week">
        <div class="ui segment">
            <div class="ui form">
                <div class="field">
                    <label>Select Week</label>
                    <input type="date" id="week-date" class="ui input">
                </div>
            </div>
            <div id="week-report" class="ui segment">
                <!-- Week report content will be loaded here -->
            </div>
        </div>
    </div>
    
    <div class="ui tab" data-tab="month">
        <div class="ui segment">
            <div class="ui form">
                <div class="field">
                    <label>Select Month</label>
                    <input type="month" id="month-date" class="ui input">
                </div>
            </div>
            <div id="month-report" class="ui segment">
                <!-- Month report content will be loaded here -->
            </div>
        </div>
    </div>
    
    <div class="ui tab" data-tab="season">
        <div class="ui segment">
            <div class="ui form">
                <div class="two fields">
                    <div class="field">
                        <label>Year</label>
                        <select id="season-year" class="ui dropdown">
                            <!-- Years will be populated dynamically -->
                        </select>
                    </div>
                    <div class="field">
                        <label>Season</label>
                        <select id="season-name" class="ui dropdown">
                            <option value="Winter">Winter</option>
                            <option value="Spring">Spring</option>
                            <option value="Summer">Summer</option>
                            <option value="Fall">Fall</option>
                        </select>
                    </div>
                </div>
            </div>
            <div id="season-report" class="ui segment">
                <!-- Season report content will be loaded here -->
            </div>
        </div>
    </div>
    
    <div class="ui tab" data-tab="year">
        <div class="ui segment">
            <div class="ui form">
                <div class="field">
                    <label>Select Year</label>
                    <select id="year-select" class="ui dropdown">
                        <!-- Years will be populated dynamically -->
                    </select>
                </div>
            </div>
            <div id="year-report" class="ui segment">
                <!-- Year report content will be loaded here -->
            </div>
        </div>
    </div>
    
    <div class="ui tab" data-tab="custom">
        <div class="ui segment">
            <div class="ui form">
                <div class="two fields">
                    <div class="field">
                        <label>Start Date</label>
                        <input type="date" id="custom-start-date" class="ui input" placeholder="Start Date">
                    </div>
                    <div class="field">
                        <label>End Date</label>
                        <input type="date" id="custom-end-date" class="ui input" placeholder="End Date">
                    </div>
                </div>
            </div>
            <div id="custom-report" class="ui segment">
                <!-- Custom report content will be loaded here -->
            </div>
        </div>
    </div>
    
    {% if config.SHOW_DEMO %}
    <div class="ui tab" data-tab="demo">
        <div class="ui segment">
            <div class="ui form">
                <div class="field">
                    <label>Demo Type</label>
                    <select id="demo-type" class="ui dropdown">
                        <option value="day">Day</option>
                        <option value="week">Week</option>
                        <option value="month">Month</option>
                        <option value="season">Season</option>
                        <option value="year">Year</option>
                    </select>
                </div>
            </div>
            <div id="demo-report" class="ui segment">
                <!-- Demo report content will be loaded here -->
            </div>
        </div>
    </div>
    {% endif %}
</div>

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Initialize Semantic UI components
    $('.ui.dropdown').dropdown();
    $('.menu .item').tab();
    
    // Initialize date inputs with current date
    const today = new Date();
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, '0');
    const day = String(today.getDate()).padStart(2, '0');
    
    // Set default dates
    document.getElementById('day-date').value = `${year}-${month}-${day}`;
    document.getElementById('week-date').value = `${year}-${month}-${day}`;
    document.getElementById('month-date').value = `${year}-${month}`;
    
    // Populate year selects
    const yearSelect = document.getElementById('year-select');
    const seasonYear = document.getElementById('season-year');
    const currentYear = new Date().getFullYear();
    
    for (let y = currentYear - 5; y <= currentYear + 5; y++) {
        const option = new Option(y, y);
        yearSelect.add(option);
        seasonYear.add(option.cloneNode(true));
    }
    
    yearSelect.value = currentYear;
    seasonYear.value = currentYear;
    
    // Event listeners for date/period changes
    document.getElementById('day-date').addEventListener('change', () => loadReport('day'));
    document.getElementById('week-date').addEventListener('change', () => loadReport('week'));
    document.getElementById('month-date').addEventListener('change', () => loadReport('month'));
    document.getElementById('season-year').addEventListener('change', () => loadReport('season'));
    document.getElementById('season-name').addEventListener('change', () => loadReport('season'));
    document.getElementById('year-select').addEventListener('change', () => loadReport('year'));
    document.getElementById('custom-start-date').addEventListener('change', () => loadReport('custom'));
    document.getElementById('custom-end-date').addEventListener('change', () => loadReport('custom'));
    if (document.getElementById('demo-type')) {
        document.getElementById('demo-type').addEventListener('change', () => loadReport('demo'));
    }
    
    // Load initial report
    loadReport('day');
});

function loadReport(type) {
    const reportDiv = document.getElementById(`${type}-report`);
    if (!reportDiv) {
        console.error(`Report div not found for type: ${type}`);
        return;
    }
    
    reportDiv.innerHTML = '<div class="ui active inverted dimmer"><div class="ui text loader">Loading...</div></div>';
    
    let url;
    switch (type) {
        case 'day':
            const dayDate = document.getElementById('day-date').value;
            url = `/api/reports/day/${dayDate}`;
            break;
        case 'week':
            const weekDate = document.getElementById('week-date').value;
            url = `/api/reports/week/${weekDate}`;
            break;
        case 'month':
            const monthDate = document.getElementById('month-date').value;
            url = `/api/reports/month/${monthDate}`;
            break;
        case 'season':
            const year = document.getElementById('season-year').value;
            const season = document.getElementById('season-name').value;
            url = `/api/reports/season/${year}/${season}`;
            break;
        case 'year':
            const selectedYear = document.getElementById('year-select').value;
            url = `/api/reports/year/${selectedYear}`;
            break;
        case 'custom':
            const startDate = document.getElementById('custom-start-date').value;
            const endDate = document.getElementById('custom-end-date').value;
            if (!startDate || !endDate) {
                reportDiv.innerHTML = '<div class="ui negative message">Please select both start and end dates</div>';
                return;
            }
            fetch('/api/reports/custom', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ start_date: startDate, end_date: endDate })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    reportDiv.innerHTML = `<div class="ui negative message">${data.error}</div>`;
                } else {
                    displayReport(data, reportDiv);
                }
            })
            .catch(error => {
                reportDiv.innerHTML = `<div class="ui negative message">Error: ${error.message}</div>`;
            });
            return;
        case 'demo':
            const demoType = document.getElementById('demo-type').value;
            url = `/api/reports/demo/${demoType}`;
            break;
        default:
            console.error(`Unknown report type: ${type}`);
            return;
    }
    
    fetch(url)
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            if (data.error) {
                reportDiv.innerHTML = `<div class="ui negative message">${data.error}</div>`;
            } else {
                displayReport(data, reportDiv);
            }
        })
        .catch(error => {
            reportDiv.innerHTML = `<div class="ui negative message">Error: ${error.message}</div>`;
        });
}

function displayReport(data, container) {
    const { time_block, stats, commitments } = data;
    
    let html = `
        <div class="ui statistics">
            <div class="statistic">
                <div class="value">${stats.total_commitments}</div>
                <div class="label">Total Commitments</div>
            </div>
            <div class="statistic">
                <div class="value">${stats.completed_commitments}</div>
                <div class="label">Completed</div>
            </div>
            <div class="statistic">
                <div class="value">${stats.completion_rate.toFixed(1)}%</div>
                <div class="label">Completion Rate</div>
            </div>
            <div class="statistic">
                <div class="value">${stats.average_rpe ? stats.average_rpe.toFixed(1) : 'N/A'}</div>
                <div class="label">Average RPE</div>
            </div>
        </div>
        
        <div class="ui segment">
            <h3 class="ui header">Commitments</h3>
            <div class="ui divided items">
                ${commitments.map(commitment => {
                    // Get the latest checkin with RPE if any
                    const latestCheckin = commitment.checkins && commitment.checkins.length > 0 
                        ? commitment.checkins.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))[0]
                        : null;
                    
                    return `
                        <div class="item">
                            <div class="content">
                                <div class="header">
                                    <div class="ui checkbox">
                                        <input type="checkbox" ${commitment.completed ? 'checked' : ''} disabled>
                                        <label>${commitment.title}</label>
                                    </div>
                                </div>
                                ${latestCheckin && latestCheckin.rpe ? `
                                    <div class="meta">
                                        <span class="ui label">RPE: ${latestCheckin.rpe}</span>
                                        ${latestCheckin.progress ? `<span class="ui label">Progress: ${latestCheckin.progress}%</span>` : ''}
                                        ${latestCheckin.mood ? `<span class="ui label">Mood: ${latestCheckin.mood}</span>` : ''}
                                        ${latestCheckin.energy ? `<span class="ui label">Energy: ${latestCheckin.energy}</span>` : ''}
                                    </div>
                                ` : ''}
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
        </div>
    `;
    
    container.innerHTML = html;
    
    // Initialize Semantic UI components
    $('.ui.checkbox').checkbox();
}
</script>
{% endblock %}
{% endblock %}
