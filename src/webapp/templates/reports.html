{% extends "base.html" %}

{% block title %}Reports{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold mb-8">Reports</h1>
    
    <!-- Report Type Tabs -->
    <div class="mb-8">
        <div class="border-b border-gray-200">
            <nav class="-mb-px flex space-x-8" aria-label="Tabs">
                <button class="tab-button border-indigo-500 text-indigo-600 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm" data-tab="day">
                    Day
                </button>
                <button class="tab-button border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm" data-tab="week">
                    Week
                </button>
                <button class="tab-button border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm" data-tab="month">
                    Month
                </button>
                <button class="tab-button border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm" data-tab="season">
                    Season
                </button>
                <button class="tab-button border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm" data-tab="year">
                    Year
                </button>
                <button class="tab-button border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm" data-tab="custom">
                    Custom
                </button>
                {% if config.SHOW_DEMO %}
                <button class="tab-button border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm" data-tab="demo">
                    Demo
                </button>
                {% endif %}
            </nav>
        </div>
    </div>
    
    <!-- Report Content -->
    <div class="report-content">
        <!-- Day Report -->
        <div class="tab-content" id="day-content">
            <div class="mb-4">
                <input type="date" id="day-date" class="form-input rounded-md shadow-sm">
            </div>
            <div id="day-report" class="bg-white shadow rounded-lg p-6">
                <!-- Day report content will be loaded here -->
            </div>
        </div>
        
        <!-- Week Report -->
        <div class="tab-content hidden" id="week-content">
            <div class="mb-4">
                <input type="date" id="week-date" class="form-input rounded-md shadow-sm">
            </div>
            <div id="week-report" class="bg-white shadow rounded-lg p-6">
                <!-- Week report content will be loaded here -->
            </div>
        </div>
        
        <!-- Month Report -->
        <div class="tab-content hidden" id="month-content">
            <div class="mb-4">
                <input type="month" id="month-date" class="form-input rounded-md shadow-sm">
            </div>
            <div id="month-report" class="bg-white shadow rounded-lg p-6">
                <!-- Month report content will be loaded here -->
            </div>
        </div>
        
        <!-- Season Report -->
        <div class="tab-content hidden" id="season-content">
            <div class="mb-4 flex space-x-4">
                <select id="season-year" class="form-select rounded-md shadow-sm">
                    <!-- Years will be populated dynamically -->
                </select>
                <select id="season-name" class="form-select rounded-md shadow-sm">
                    <option value="Winter">Winter</option>
                    <option value="Spring">Spring</option>
                    <option value="Summer">Summer</option>
                    <option value="Fall">Fall</option>
                </select>
            </div>
            <div id="season-report" class="bg-white shadow rounded-lg p-6">
                <!-- Season report content will be loaded here -->
            </div>
        </div>
        
        <!-- Year Report -->
        <div class="tab-content hidden" id="year-content">
            <div class="mb-4">
                <select id="year-select" class="form-select rounded-md shadow-sm">
                    <!-- Years will be populated dynamically -->
                </select>
            </div>
            <div id="year-report" class="bg-white shadow rounded-lg p-6">
                <!-- Year report content will be loaded here -->
            </div>
        </div>
        
        <!-- Custom Report -->
        <div class="tab-content hidden" id="custom-content">
            <div class="mb-4 flex space-x-4">
                <input type="date" id="custom-start-date" class="form-input rounded-md shadow-sm" placeholder="Start Date">
                <input type="date" id="custom-end-date" class="form-input rounded-md shadow-sm" placeholder="End Date">
            </div>
            <div id="custom-report" class="bg-white shadow rounded-lg p-6">
                <!-- Custom report content will be loaded here -->
            </div>
        </div>
        
        <!-- Demo Report -->
        {% if config.SHOW_DEMO %}
        <div class="tab-content hidden" id="demo-content">
            <div class="mb-4">
                <select id="demo-type" class="form-select rounded-md shadow-sm">
                    <option value="day">Day</option>
                    <option value="week">Week</option>
                    <option value="month">Month</option>
                    <option value="season">Season</option>
                    <option value="year">Year</option>
                </select>
            </div>
            <div id="demo-report" class="bg-white shadow rounded-lg p-6">
                <!-- Demo report content will be loaded here -->
            </div>
        </div>
        {% endif %}
    </div>
</div>

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Initialize date inputs with current date
    const today = new Date();
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, '0');
    const day = String(today.getDate()).padStart(2, '0');
    
    // Set default dates
    document.getElementById('day-date').value = `${year}-${month}-${day}`;
    document.getElementById('week-date').value = `${year}-${month}-${day}`;
    document.getElementById('month-date').value = `${year}-${month}`;
    
    // Populate year selects
    const yearSelect = document.getElementById('year-select');
    const seasonYear = document.getElementById('season-year');
    const currentYear = new Date().getFullYear();
    
    for (let y = currentYear - 5; y <= currentYear + 5; y++) {
        const option = new Option(y, y);
        yearSelect.add(option);
        seasonYear.add(option.cloneNode(true));
    }
    
    yearSelect.value = currentYear;
    seasonYear.value = currentYear;
    
    // Tab switching
    const tabs = document.querySelectorAll('.tab-button');
    const contents = document.querySelectorAll('.tab-content');
    
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            // Update tab styles
            tabs.forEach(t => {
                t.classList.remove('border-indigo-500', 'text-indigo-600');
                t.classList.add('border-transparent', 'text-gray-500');
            });
            tab.classList.remove('border-transparent', 'text-gray-500');
            tab.classList.add('border-indigo-500', 'text-indigo-600');
            
            // Show selected content
            const tabId = tab.dataset.tab;
            contents.forEach(content => {
                content.classList.add('hidden');
                if (content.id === `${tabId}-content`) {
                    content.classList.remove('hidden');
                    loadReport(tabId);
                }
            });
        });
    });
    
    // Load initial report
    loadReport('day');
    
    // Event listeners for date/period changes
    document.getElementById('day-date').addEventListener('change', () => loadReport('day'));
    document.getElementById('week-date').addEventListener('change', () => loadReport('week'));
    document.getElementById('month-date').addEventListener('change', () => loadReport('month'));
    document.getElementById('season-year').addEventListener('change', () => loadReport('season'));
    document.getElementById('season-name').addEventListener('change', () => loadReport('season'));
    document.getElementById('year-select').addEventListener('change', () => loadReport('year'));
    document.getElementById('custom-start-date').addEventListener('change', () => loadReport('custom'));
    document.getElementById('custom-end-date').addEventListener('change', () => loadReport('custom'));
    if (document.getElementById('demo-type')) {
        document.getElementById('demo-type').addEventListener('change', () => loadReport('demo'));
    }
});

function loadReport(type) {
    const reportDiv = document.getElementById(`${type}-report`);
    if (!reportDiv) {
        console.error(`Report div not found for type: ${type}`);
        return;
    }
    
    reportDiv.innerHTML = '<div class="text-center py-4">Loading...</div>';
    
    let url;
    switch (type) {
        case 'day':
            const dayDate = document.getElementById('day-date').value;
            url = `/api/reports/day/${dayDate}`;
            break;
        case 'week':
            const weekDate = document.getElementById('week-date').value;
            url = `/api/reports/week/${weekDate}`;
            break;
        case 'month':
            const monthDate = document.getElementById('month-date').value;
            url = `/api/reports/month/${monthDate}`;
            break;
        case 'season':
            const year = document.getElementById('season-year').value;
            const season = document.getElementById('season-name').value;
            url = `/api/reports/season/${year}/${season}`;
            break;
        case 'year':
            const selectedYear = document.getElementById('year-select').value;
            url = `/api/reports/year/${selectedYear}`;
            break;
        case 'custom':
            const startDate = document.getElementById('custom-start-date').value;
            const endDate = document.getElementById('custom-end-date').value;
            if (!startDate || !endDate) {
                reportDiv.innerHTML = '<div class="text-center py-4 text-red-500">Please select both start and end dates</div>';
                return;
            }
            fetch('/api/reports/custom', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ start_date: startDate, end_date: endDate })
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    reportDiv.innerHTML = `<div class="text-center py-4 text-red-500">${data.error}</div>`;
                } else {
                    displayReport(data, reportDiv);
                }
            })
            .catch(error => {
                reportDiv.innerHTML = `<div class="text-center py-4 text-red-500">Error: ${error.message}</div>`;
            });
            return;
        case 'demo':
            const demoType = document.getElementById('demo-type').value;
            url = `/api/reports/demo/${demoType}`;
            break;
        default:
            console.error(`Unknown report type: ${type}`);
            return;
    }
    
    fetch(url)
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            if (data.error) {
                reportDiv.innerHTML = `<div class="text-center py-4 text-red-500">${data.error}</div>`;
            } else {
                displayReport(data, reportDiv);
            }
        })
        .catch(error => {
            reportDiv.innerHTML = `<div class="text-center py-4 text-red-500">Error: ${error.message}</div>`;
        });
}

function displayReport(data, container) {
    const { time_block, stats, commitments } = data;
    
    let html = `
        <div class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                <div class="bg-gray-50 p-4 rounded-lg">
                    <h3 class="text-sm font-medium text-gray-500">Total Commitments</h3>
                    <p class="mt-1 text-2xl font-semibold text-gray-900">${stats.total_commitments}</p>
                </div>
                <div class="bg-gray-50 p-4 rounded-lg">
                    <h3 class="text-sm font-medium text-gray-500">Completed</h3>
                    <p class="mt-1 text-2xl font-semibold text-gray-900">${stats.completed_commitments}</p>
                </div>
                <div class="bg-gray-50 p-4 rounded-lg">
                    <h3 class="text-sm font-medium text-gray-500">Completion Rate</h3>
                    <p class="mt-1 text-2xl font-semibold text-gray-900">${stats.completion_rate.toFixed(1)}%</p>
                </div>
                <div class="bg-gray-50 p-4 rounded-lg">
                    <h3 class="text-sm font-medium text-gray-500">Average RPE</h3>
                    <p class="mt-1 text-2xl font-semibold text-gray-900">${stats.average_rpe ? stats.average_rpe.toFixed(1) : 'N/A'}</p>
                </div>
            </div>
            
            <div class="bg-white shadow rounded-lg">
                <div class="px-4 py-5 sm:p-6">
                    <h3 class="text-lg font-medium text-gray-900">Commitments</h3>
                    <div class="mt-4 space-y-4">
                        ${commitments.map(commitment => `
                            <div class="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                                <div class="flex items-center space-x-3">
                                    <input type="checkbox" class="h-4 w-4 text-indigo-600" 
                                           ${commitment.completed ? 'checked' : ''} disabled>
                                    <span class="text-sm font-medium text-gray-900">${commitment.title}</span>
                                </div>
                                ${commitment.rpe ? `
                                    <span class="text-sm text-gray-500">RPE: ${commitment.rpe}</span>
                                ` : ''}
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        </div>
    `;
    
    container.innerHTML = html;
}
</script>
{% endblock %}
{% endblock %}
