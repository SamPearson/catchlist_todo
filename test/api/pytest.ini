[pytest]
pythonpath = .



markers =
    # Test Depth Markers
    smoke_test: Testing core functionality aka happy path
    crud: Create/Read/Update/Delete operations
    error_handling: Error scenarios

    # Test Priority Markers
    critical: Critical functionality
    high: High priority
    medium: Medium priority


    # Primary Feature Markers
    tasks: Task-related tests
    projects: Project-related tests
    subtasks: Tests for tasks associated with projects

    # Secondary Feature Markers
    reports
    day_report
    week_report

    tags
    principles
    relationships: Cross-entity relationships


    # Action/Function markers
    completion: Task completion states
    filtering: Query/filtering logic
    attach_detach: Tests for attaching and detaching tags, subtasks, etc