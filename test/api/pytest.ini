[pytest]
pythonpath = .

markers =
    # Test Depth
    smoke_test: Minimal happy-path coverage to prove system works

    # Test Function
    auth
    multi_user
    activation_status
    caldav

    # CRUD Test Markers
    crud: Create/Read/Update/Delete operations
    create: crud subtype for creating entities
    get:    crud subtype for fetching one entity instance
    list:   crud subtype for listing multiple entities
    update: crud subtype for modifying entities
    delete: crud subtype for deleting entities

    # Integration Test Markers
    entity_integration: Cross-entity behavior and relationships

    # Search Test Markers
    advanced_search: Complex or specific search queries

    # Entity Markers
    tasks
    projects
    subtasks
    calendars
    routines
    sessions
    timeframes
    commitments
    checkins
    tags
    principles
    reports
    day_reports
    week_reports
    month_reports
    season_reports
    annual_reports

