<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.css">
    <script src="https://cdn.jsdelivr.net/npm/semantic-ui@2.4.2/dist/semantic.min.js"></script>
</head>

<body>
    <div class="ui container">
        <div class="ui secondary menu">
            <a href="/" class="item auth-link" id="home-link">
                <i class="home icon"></i> Home
            </a>
            <div class="right menu">
                <a href="/login" class="item" id="login-link">
                    <i class="sign in icon"></i> Login
                </a>
                <a href="/register" class="item" id="register-link">
                    <i class="user plus icon"></i> Register
                </a>
                <a href="/logout" class="item" id="logout-link" style="display: none;">
                    <i class="sign out icon"></i> Logout
                </a>
            </div>
        </div>

        {% block content %}
        <h1 class="ui center aligned header">To Do App</h1>

        <form class="ui form" action="/add" method="post" id="todo-entry-form">
            <div class="field">
                <label>Todo Title</label>
                <input type="text" name="title" placeholder="Enter Todo" id="todo-entry-title">
                <br>
                <button class="ui blue button" type="submit" id="todo-entry-add-button">Add</button>
            </div>
        </form>

        <hr>

        {% for todo in todo_list %}
        <div class="ui segment" data-testid="todo-display">
            <p class="ui big header" data-testid="todo-display-header">{{todo.id }} | {{ todo.title }}</p>

                {% if todo.complete == False %}
                    <span class="ui gray label" data-testid="todo-display-completion">Not Complete</span>
                {% else %}
                    <span class="ui green label" data-testid="todo-display-completion">Completed</span>
                {% endif %}

                <a class="ui blue button" href="/update/{{ todo.id }}" data-testid="todo-display-update-button">Update</a>
                <button class="ui red button" onclick="deleteTodo({{ todo.id }})" data-testid="todo-display-delete-button">Delete</button>
        </div>
        {% endfor %}
        {% endblock %}
    </div>

    <script>
    function deleteTodo(todoId) {
        fetch(`/delete/${todoId}`, { 
            method: 'DELETE',
            headers: {
                'Authorization': `Bearer ${localStorage.getItem('token')}`
            }
        })
        .then(response => {
            if (response.ok) {
                window.location.reload();
            } else {
                alert("Failed to delete todo.");
            }
        })
        .catch(error => console.error("Error deleting todo:", error));
    }

    // Check authentication status and update UI
    function updateAuthUI() {
        const token = localStorage.getItem('token');
        const isLoggedIn = !!token;
        
        document.getElementById('login-link').style.display = isLoggedIn ? 'none' : 'block';
        document.getElementById('register-link').style.display = isLoggedIn ? 'none' : 'block';
        document.getElementById('logout-link').style.display = isLoggedIn ? 'block' : 'none';
    }

    // Update UI on page load
    updateAuthUI();

    // Modify navigation links to include the token
    document.addEventListener('DOMContentLoaded', function() {
        const token = localStorage.getItem('token');
        if (token) {
            // Update the home link to include the token directly
            const homeLink = document.getElementById('home-link');
            const homeUrl = new URL(homeLink.href, window.location.origin);
            homeUrl.searchParams.set('token', token);
            homeLink.href = homeUrl.toString();
            
            // Add token as a custom header for AJAX requests
            document.querySelectorAll('.auth-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    
                    // Send the request with the token in the headers
                    fetch(this.href, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    })
                    .then(response => {
                        if (response.redirected) {
                            window.location.href = response.url;
                        } else {
                            return response.text();
                        }
                    })
                    .then(html => {
                        if (html) {
                            document.open();
                            document.write(html);
                            document.close();
                        }
                    })
                    .catch(error => console.error('Error:', error));
                });
            });
        }
    });

    // Handle logout
    document.getElementById('logout-link').addEventListener('click', function(e) {
        e.preventDefault();
        localStorage.removeItem('token');
        window.location.href = '/';
    });
    </script>
</body>
</html>
